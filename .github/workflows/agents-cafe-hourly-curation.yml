name: "Agents — Cafe Hourly Curation (08:20~01:15 KST, 45분 간격, 100건/일)"

on:
  schedule:
    - cron: "20 23 * * *"  # 08:20 KST (07:40 크롤 완료 후 첫 슬롯)
    - cron: "5 0 * * *"    # 09:05 KST
    - cron: "50 0 * * *"   # 09:50 KST
    - cron: "35 1 * * *"   # 10:35 KST (09:30 크롤 반영 시작)
    - cron: "20 2 * * *"   # 11:20 KST
    - cron: "5 3 * * *"    # 12:05 KST
    - cron: "50 3 * * *"   # 12:50 KST
    - cron: "35 4 * * *"   # 13:35 KST (11:30 full 크롤 반영 시작)
    - cron: "20 5 * * *"   # 14:20 KST
    - cron: "5 6 * * *"    # 15:05 KST
    - cron: "50 6 * * *"   # 15:50 KST (14:30 크롤 반영)
    - cron: "35 7 * * *"   # 16:35 KST
    - cron: "20 8 * * *"   # 17:20 KST
    - cron: "5 9 * * *"    # 18:05 KST (17:30 크롤 반영)
    - cron: "50 9 * * *"   # 18:50 KST
    - cron: "35 10 * * *"  # 19:35 KST
    - cron: "20 11 * * *"  # 20:20 KST
    - cron: "5 12 * * *"   # 21:05 KST
    - cron: "50 12 * * *"  # 21:50 KST (마지막 일반 슬롯)
    - cron: "15 16 * * *"  # 01:15 KST (저녁/새벽 감성글 특별 슬롯, 00:30 크롤 완료 후)
  workflow_dispatch:

# 동시 실행 금지 — 이전 실행 완료 후 다음 큐레이션 실행
concurrency:
  group: cafe-hourly-curation
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  PERSONA_MATCHER_MODE: 'shadow' # persona matcher 1단계 — 기록만(off|shadow, on은 미지원). 코드 기본값 off
  INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Run Image Router (이미지 CafePost → Sheet PENDING append)
        run: |
          # cron-link-check: runner.ts cafe_crawler image-route
          run_with_emaxconn_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -q "EMAXCONN"; then
              return "$status"
            fi

            echo "::warning::$label hit DB connection limit (EMAXCONN); waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -q "EMAXCONN"; then
              echo "::warning::$label still hit EMAXCONN after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          run_with_emaxconn_retry "image router" bash -lc "cd agents && npx tsx cron/runner.ts cafe_crawler image-route"
        env:
          ENABLE_IMAGE_ROUTER: ${{ vars.ENABLE_IMAGE_ROUTER || 'false' }}
          DRY_RUN_IMAGE_ROUTER: ${{ vars.DRY_RUN_IMAGE_ROUTER || 'true' }}
          IMAGE_ROUTER_DAY_CAP: ${{ vars.IMAGE_ROUTER_DAY_CAP }}
          IMAGE_ROUTER_TAB_CAP: ${{ vars.IMAGE_ROUTER_TAB_CAP }}
          IMAGE_ROUTER_PENDING_BACKLOG_LIMIT: ${{ vars.IMAGE_ROUTER_PENDING_BACKLOG_LIMIT }}
          SHEETS_SCRAPER_ID: ${{ secrets.SHEETS_SCRAPER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Run Content Curator (45분 간격 5건 — runner.ts 25분 중복 방지 내장)
        run: |
          # cron-link-check: runner.ts cafe_crawler content-curate
          run_with_emaxconn_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -q "EMAXCONN"; then
              return "$status"
            fi

            echo "::warning::$label hit DB connection limit (EMAXCONN); waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -q "EMAXCONN"; then
              echo "::warning::$label still hit EMAXCONN after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          run_with_emaxconn_retry "content curator" bash -lc "cd agents && npx tsx cron/runner.ts cafe_crawler content-curate"
