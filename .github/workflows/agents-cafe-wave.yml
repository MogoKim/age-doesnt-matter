name: "Agents — Cafe Comment Wave"

on:
  schedule:
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 * * * *" # 5분마다 — sheet viral wave와 시작 분산 (wave1 최대 5분 지연 허용)
  workflow_dispatch: {}

# agents-cafe.yml과 독립 concurrency group → 큐레이션/크론 실행 중에도 독립 실행 (GHA 부하 시 지연 가능)
concurrency:
  group: cafe-comment-wave
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  COMMENT_WAVE_V2_ENABLED: ${{ vars.COMMENT_WAVE_V2_ENABLED || 'false' }}
  COMMENT_WAVE_V2_DATE: ${{ vars.COMMENT_WAVE_V2_DATE || '2099-01-01T00:00:00Z' }}
  AGENT_DB_POOL_MAX: "1"

jobs:
  wave-process:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Process Comment Waves (wave1~4 순차 댓글 게시)
        run: |
          # cron-link-check: runner.ts cafe_crawler wave-process
          run_with_emaxconn_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -q "EMAXCONN"; then
              return "$status"
            fi

            echo "::warning::$label hit DB connection limit (EMAXCONN); waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -q "EMAXCONN"; then
              echo "::warning::$label still hit EMAXCONN after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          run_with_emaxconn_retry "cafe wave" bash -lc "cd agents && npx tsx cron/runner.ts cafe_crawler wave-process"

      - name: Process User Post Waves (회원 글 댓글 파동)
        run: |
          # cron-link-check: runner.ts cafe_crawler user-post-wave-process
          run_with_emaxconn_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -q "EMAXCONN"; then
              return "$status"
            fi

            echo "::warning::$label hit DB connection limit (EMAXCONN); waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -q "EMAXCONN"; then
              echo "::warning::$label still hit EMAXCONN after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          run_with_emaxconn_retry "user post wave" bash -lc "cd agents && npx tsx cron/runner.ts cafe_crawler user-post-wave-process"
