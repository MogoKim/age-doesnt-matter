name: "Agents — Cafe Comment Wave"

on:
  schedule:
    - cron: "*/5 * * * *" # 5분마다 — 실제 runner 호출은 아래에서 지연해 DB 접속 피크 분산
  workflow_dispatch: {}

# agents-cafe.yml과 독립 concurrency group → 큐레이션/크론 실행 중에도 독립 실행 (GHA 부하 시 지연 가능)
concurrency:
  group: cafe-comment-wave
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  COMMENT_WAVE_V2_ENABLED: ${{ vars.COMMENT_WAVE_V2_ENABLED || 'false' }}
  COMMENT_WAVE_V2_DATE: ${{ vars.COMMENT_WAVE_V2_DATE || '2099-01-01T00:00:00Z' }}
  AGENT_DB_POOL_MAX: "1"
  # 5분마다 도는 고빈도 잡 → 5432 직접연결로 라우팅해 Supavisor(6543) lobby 200 경합에서 분리 (EMAXCONN 완화)
  AGENT_DB_USE_DIRECT: "true"

jobs:
  wave-process:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Process Comment Waves (wave1~4 순차 댓글 게시)
        run: |
          echo "[CafeWave] Waiting 45s before DB work to stagger high-frequency agent jobs."
          sleep 45

          # cron-link-check: runner.ts cafe_crawler wave-process
          run_with_emaxconn_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -Eiq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              return "$status"
            fi

            echo "::warning::$label hit transient DB connection failure; waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -Eiq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              echo "::warning::$label still hit transient DB connection failure after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          run_with_emaxconn_retry "cafe wave" bash -lc "cd agents && npx tsx cron/runner.ts cafe_crawler wave-process"

      - name: Process User Post Waves (회원 글 댓글 파동)
        run: |
          # cron-link-check: runner.ts cafe_crawler user-post-wave-process
          run_with_emaxconn_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -Eiq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              return "$status"
            fi

            echo "::warning::$label hit transient DB connection failure; waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -Eiq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              echo "::warning::$label still hit transient DB connection failure after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          run_with_emaxconn_retry "user post wave" bash -lc "cd agents && npx tsx cron/runner.ts cafe_crawler user-post-wave-process"

      - name: Process Sheet Viral Waves fallback (댓글/좋아요)
        run: |
          echo "[SheetViralFallback] Waiting 150s before DB work to stagger high-frequency agent jobs."
          sleep 150

          # cron-link-check: runner.ts seed viral-waves
          # Fallback path: agents-sheet-viral.yml schedule can be delayed/dropped by GitHub.
          # Atomic claim in scheduler.ts prevents duplicate DB writes if the dedicated workflow also runs.
          run_with_emaxconn_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -Eiq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              return "$status"
            fi

            echo "::warning::$label hit transient DB connection failure; waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -Eiq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              echo "::warning::$label still hit transient DB connection failure after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          run_with_emaxconn_retry "sheet viral wave fallback" bash -lc "cd agents && npx tsx cron/runner.ts seed viral-waves"
