name: "Agents — Cafe Trend & Curate"

on:
  workflow_dispatch:
    inputs:
      step:
        description: "실행 단계 (analyze / curate / external / sheet-scrape / brief-monitor / all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - analyze
          - curate
          - external
          - sheet-scrape
          - brief-monitor

  # 매일 09:00, 13:30, 20:30 KST — 카페 트렌드 분석 + 콘텐츠 큐레이션
  # 매일 09:30 KST — DailyBrief 생성 모니터 (run-pipeline 미실행 감지)
  # 매일 11:00, 21:00 KST — 시트 스크래퍼 (펨코/오유/네이트판)
  schedule:
    - cron: "0 0 * * *"   # 09:00 KST (08:30 딥크롤 30분 후)
    - cron: "30 0 * * *"  # 09:30 KST — DailyBrief 모니터 (run-pipeline 미실행 감지)
    - cron: "30 4 * * *"  # 13:30 KST (12:55 딥크롤 35분 후)
    - cron: "30 11 * * *" # 20:30 KST (20:00 딥크롤 30분 후)
    - cron: "0 2 * * *"   # 11:00 KST — sheet-scrape
    - cron: "0 12 * * *"  # 21:00 KST — sheet-scrape

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  SHEETS_SCRAPER_ID: ${{ secrets.SHEETS_SCRAPER_ID }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
  CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
  CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
  NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}

jobs:
  analyze-and-curate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule != '30 0 * * *')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Run Trend Analyzer
        # 20:30 KST 딥크롤 결과만 분석 (09:00/13:30 scheduled는 curate만 실행 — 중복 비용 제거)
        if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'analyze' || (github.event_name == 'schedule' && github.event.schedule == '30 11 * * *') }}
        run: cd agents && npx tsx cron/runner.ts cafe_crawler trend-analysis

      - name: Run Content Curator
        if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'curate' || github.event_name == 'schedule' }}
        run: cd agents && npx tsx cron/runner.ts cafe_crawler content-curate

  sheet-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event.inputs.step == 'all' || github.event.inputs.step == 'sheet-scrape' ||
      (github.event_name == 'schedule' && (github.event.schedule == '0 2 * * *' || github.event.schedule == '0 12 * * *'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Install Playwright Chromium
        run: cd agents && npx playwright install chromium --with-deps

      - name: Run Sheet Scraper (펨코 제외 — 로컬 Mac에서 처리)
        run: cd agents && npx tsx cron/runner.ts community sheet-scrape
        env:
          SHEET_SCRAPER_EXCLUDE_SITE: fmkorea

  brief-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.step == 'all' || github.event.inputs.step == 'brief-monitor'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Run Brief Monitor (DailyBrief 미생성 감지)
        run: cd agents && npx tsx cron/runner.ts cafe_crawler brief-monitor
