name: "Agents — Cafe Brief"

on:
  workflow_dispatch:
    inputs:
      step:
        description: "실행 단계 (brief-fallback / brief-monitor / all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - brief-fallback
          - brief-monitor

  # 매일 09:03 KST — brief-fallback
  # 매일 09:30 KST — brief-monitor
  # 매일 18:00 KST — evening-brief-safety (11:30 full 크롤 실패 시 공백 방지)
  # 시트 스크래퍼 → agents-scraper.yml (별도 워크플로우, 5회/일)
  # 큐레이션(5건/시간) → agents-cafe-hourly-curation.yml (09~23시 KST, 별도 워크플로우)
  # 댓글 파동(wave1~4) → agents-cafe-wave.yml (별도 concurrency group)
  schedule:
    - cron: "3 0 * * *"    # 09:03 KST — brief-fallback
    - cron: "30 0 * * *"   # 09:30 KST — brief-monitor
    - cron: "0 9 * * *"    # 18:00 KST — evening-brief-safety

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  SHEETS_SCRAPER_ID: ${{ secrets.SHEETS_SCRAPER_ID }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
  CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
  CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
  NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  brief-fallback:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 09:03 KST (3 0 * * * UTC) — Mac launchd(08:45 KST) 실행 여부 확인 후 없으면 fallback_yesterday 생성
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'brief-fallback' || (github.event_name == 'schedule' && github.event.schedule == '3 0 * * *') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx prisma generate

      - name: Run DailyBrief Fallback (Mac 미실행 시 fallback_yesterday 자동 생성)
        run: cd agents && npx tsx cron/runner.ts cafe_crawler daily-brief-fallback

  brief-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'brief-monitor' || (github.event_name == 'schedule' && github.event.schedule == '30 0 * * *') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Run DailyBrief Monitor
        run: cd agents && npx tsx cron/runner.ts cafe_crawler brief-monitor

  evening-brief-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 18:00 KST (0 9 * * * UTC) — 오늘 DailyBrief 없으면 fallback_yesterday 생성 (11:30 KST full 크롤 실패 안전망)
    if: ${{ github.event.inputs.step == 'evening-brief-safety' || (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Run Evening DailyBrief Safety Net (오늘 브리프 없으면 생성)
        run: cd agents && npx tsx cron/runner.ts cafe_crawler evening-brief-safety

  # sheet-scrape → agents-scraper.yml 로 이전됨 (2026-05-15)
