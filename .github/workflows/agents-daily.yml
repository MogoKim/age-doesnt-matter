name: Agents — Daily
on:
  schedule:
    # 09:00 KST = 00:00 UTC — CEO 모닝 사이클
    - cron: "0 0 * * *"
    # 10:00 KST = 01:00 UTC — CMO 트렌드 (화~일) / CEO 주간 리포트 (월)
    - cron: "0 1 * * *"
    # 11:00 KST = 02:00 UTC — CPO UX 분석
    - cron: "0 2 * * *"
    # 14:00 KST = 05:00 UTC — COO 콘텐츠
    - cron: "0 5 * * *"
    # 09:45 KST = 00:45 UTC — 매거진 모닝 발행 (로컬 launchd로 전환 — 비활성화)
    # - cron: "45 0 * * *"
    # 16:00 KST = 07:00 UTC — 매거진 자동발행 (GitHub Actions + 로컬 launchd 이중화)
    - cron: "0 7 * * *"
    # 19:30 KST = 10:30 UTC — 매거진 이브닝 발행 (로컬 launchd로 전환 — 비활성화)
    # - cron: "30 10 * * *"
    # 22:00 KST = 13:00 UTC — CDO KPI
    - cron: "0 13 * * *"
    # 08:30 KST = 23:30 UTC (전날) — CEO SNS 일일 브리핑
    - cron: "30 23 * * *"
    # 09:30 KST = 00:30 UTC — 승인 대기 리마인더 + 만료 처리
    - cron: "30 0 * * *"
    # 12:00 KST = 03:00 UTC — COO 트렌딩 스코어 (화~일) / CPO 사용자 여정 (월)
    - cron: "0 3 * * *"
    # 18:00 KST = 09:00 UTC — COO 트렌딩 스코어 (2차)
    - cron: "0 9 * * *"
    # 06:00 KST = 21:00 UTC (전날) — CTO 보안 감사
    - cron: "0 21 * * *"
    # 11:30 KST = 02:30 UTC (월요일) — CPO 기능 사용률
    - cron: "30 2 * * 1"
    # 23:00 KST = 14:00 UTC — CFO 비용
    - cron: "0 14 * * *"
    # 23:30 KST = 14:30 UTC — CFO 수익 추적
    - cron: "30 14 * * *"
    # ─── Phase 4 신규 에이전트 ───
    # 09:15 KST = 00:15 UTC — COO 느슨한 연결 촉진 (1차)
    - cron: "15 0 * * *"
    # 10:15 KST = 01:15 UTC — CMO 간병 큐레이션
    - cron: "15 1 * * *"
    # 10:30 KST = 01:30 UTC — COO 댓글 활성화 (1차)
    - cron: "30 1 * * *"
    # 10:45 KST = 01:45 UTC — CMO 건강불안 해소
    - cron: "45 1 * * *"
    # 11:15 KST = 02:15 UTC — CMO 유머 큐레이션
    - cron: "15 2 * * *"
    # 11:45 KST = 02:45 UTC — COO 일자리 매칭
    - cron: "45 2 * * *"
    # 12:15 KST = 03:15 UTC — COO 대댓글 체인 (1차)
    - cron: "15 3 * * *"
    # 14:30 KST = 05:30 UTC — COO 댓글 활성화 (2차)
    - cron: "30 5 * * *"
    # 15:00 KST = 06:00 UTC — COO 느슨한 연결 촉진 (2차)
    - cron: "0 6 * * *"
    # 18:30 KST = 09:30 UTC — COO 대댓글 체인 (2차)
    - cron: "30 9 * * *"
    # 20:00 KST = 11:00 UTC — COO 댓글 활성화 (3차)
    - cron: "0 11 * * *"
    # 07:00 KST = 22:00 UTC (전날) — CTO 크롤링 헬스
    - cron: "0 22 * * *"
    # 22:30 KST = 13:30 UTC — CDO 참여 최적화
    - cron: "30 13 * * *"
    # 23:45 KST = 14:45 UTC — CTO QA 크론 실행 감사
    - cron: "45 14 * * *"
    # ─── Phase 5: CTO 거버넌스 + QA 에이전트 ───
    # 08:20 KST = 23:20 UTC (전날) — QA 콘텐츠 감사
    - cron: "20 23 * * *"
    # 07:00 KST 월요일 = 22:00 UTC (일요일) — CTO 주간 아키텍처 리뷰
    - cron: "0 22 * * 0"
  workflow_dispatch:
    inputs:
      agent:
        description: "에이전트 (ceo, cmo, cpo, coo, cdo, cfo)"
        required: true
      task:
        description: "태스크"
        required: true

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_STRATEGIC: ${{ secrets.CLAUDE_MODEL_STRATEGIC }}
  CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  SITE_URL: ${{ secrets.SITE_URL }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
  CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
  CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
  NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}
  UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
  GOOGLE_INDEXING_CLIENT_EMAIL: ${{ secrets.GOOGLE_INDEXING_CLIENT_EMAIL }}
  GOOGLE_INDEXING_PRIVATE_KEY: ${{ secrets.GOOGLE_INDEXING_PRIVATE_KEY }}

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - name: Determine agent and task
        id: determine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "agent=${{ github.event.inputs.agent }}" >> $GITHUB_OUTPUT
            echo "task=${{ github.event.inputs.task }}" >> $GITHUB_OUTPUT
          else
            # github.event.schedule로 매칭 — cron 딜레이와 무관하게 정확히 동작
            CRON="${{ github.event.schedule }}"
            DOW=$(date -u +%u)  # 1=Monday
            case "$CRON" in
              "0 0 * * *")
                echo "agent=ceo" >> $GITHUB_OUTPUT; echo "task=morning-cycle" >> $GITHUB_OUTPUT ;;
              "0 1 * * *")
                if [ "$DOW" = "1" ]; then
                  echo "agent=ceo" >> $GITHUB_OUTPUT; echo "task=weekly-report" >> $GITHUB_OUTPUT
                else
                  echo "agent=cmo" >> $GITHUB_OUTPUT; echo "task=trend-analyzer" >> $GITHUB_OUTPUT
                fi
                ;;
              "0 2 * * *")
                echo "agent=cpo" >> $GITHUB_OUTPUT; echo "task=ux-analyzer" >> $GITHUB_OUTPUT ;;
              "0 5 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=content-scheduler" >> $GITHUB_OUTPUT ;;
              # "45 0 * * *") magazine-morning — 로컬 launchd로 전환
              "0 7 * * *")
                echo "agent=cafe_crawler" >> $GITHUB_OUTPUT; echo "task=magazine-generate" >> $GITHUB_OUTPUT ;;
              # "30 10 * * *") magazine-evening — 로컬 launchd로 전환
              "0 13 * * *")
                echo "agent=cdo" >> $GITHUB_OUTPUT; echo "task=kpi-collector" >> $GITHUB_OUTPUT ;;
              "0 14 * * *")
                echo "agent=cfo" >> $GITHUB_OUTPUT; echo "task=cost-tracker" >> $GITHUB_OUTPUT ;;
              "30 14 * * *")
                echo "agent=cfo" >> $GITHUB_OUTPUT; echo "task=revenue-tracker" >> $GITHUB_OUTPUT ;;
              "30 0 * * *")
                echo "agent=ceo" >> $GITHUB_OUTPUT; echo "task=approval-reminder" >> $GITHUB_OUTPUT ;;
              "30 23 * * *")
                echo "agent=ceo" >> $GITHUB_OUTPUT; echo "task=morning-sns-briefing" >> $GITHUB_OUTPUT ;;
              "0 3 * * *")
                if [ "$DOW" = "1" ]; then
                  echo "agent=cpo" >> $GITHUB_OUTPUT; echo "task=journey-analyzer" >> $GITHUB_OUTPUT
                else
                  echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=trending-scorer" >> $GITHUB_OUTPUT
                fi
                ;;
              "0 9 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=trending-scorer" >> $GITHUB_OUTPUT ;;
              "0 21 * * *")
                echo "agent=cto" >> $GITHUB_OUTPUT; echo "task=security-audit" >> $GITHUB_OUTPUT ;;
              "30 2 * * 1")
                echo "agent=cpo" >> $GITHUB_OUTPUT; echo "task=feature-tracker" >> $GITHUB_OUTPUT ;;
              "15 0 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=connection-facilitator" >> $GITHUB_OUTPUT ;;
              "15 1 * * *")
                echo "agent=cmo" >> $GITHUB_OUTPUT; echo "task=caregiving-curator" >> $GITHUB_OUTPUT ;;
              "30 1 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=comment-activator" >> $GITHUB_OUTPUT ;;
              "45 1 * * *")
                echo "agent=cmo" >> $GITHUB_OUTPUT; echo "task=health-anxiety-responder" >> $GITHUB_OUTPUT ;;
              "15 2 * * *")
                echo "agent=cmo" >> $GITHUB_OUTPUT; echo "task=humor-curator" >> $GITHUB_OUTPUT ;;
              "45 2 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=job-matcher" >> $GITHUB_OUTPUT ;;
              "15 3 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=reply-chain-driver" >> $GITHUB_OUTPUT ;;
              "30 5 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=comment-activator" >> $GITHUB_OUTPUT ;;
              "0 6 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=connection-facilitator" >> $GITHUB_OUTPUT ;;
              "30 9 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=reply-chain-driver" >> $GITHUB_OUTPUT ;;
              "0 11 * * *")
                echo "agent=coo" >> $GITHUB_OUTPUT; echo "task=comment-activator" >> $GITHUB_OUTPUT ;;
              "0 22 * * 0")
                echo "agent=cto" >> $GITHUB_OUTPUT; echo "task=arch-review" >> $GITHUB_OUTPUT ;;
              "0 22 * * *")
                echo "agent=cto" >> $GITHUB_OUTPUT; echo "task=crawler-health" >> $GITHUB_OUTPUT ;;
              "30 13 * * *")
                echo "agent=cdo" >> $GITHUB_OUTPUT; echo "task=engagement-optimizer" >> $GITHUB_OUTPUT ;;
              "45 14 * * *")
                echo "agent=cto" >> $GITHUB_OUTPUT; echo "task=qa-verify" >> $GITHUB_OUTPUT ;;
              "20 23 * * *")
                echo "agent=qa" >> $GITHUB_OUTPUT; echo "task=content-audit" >> $GITHUB_OUTPUT ;;
              *)
                echo "agent=skip" >> $GITHUB_OUTPUT; echo "task=skip" >> $GITHUB_OUTPUT ;;
            esac
          fi
      - name: Set QA env
        if: github.event.schedule == '45 14 * * *'
        run: echo "QA_MODE=cron-audit" >> $GITHUB_ENV
      - name: Install Playwright Chromium (magazine thumbnail)
        if: steps.determine.outputs.task == 'magazine-generate'
        run: npx playwright install chromium --with-deps
      - name: Run agent
        if: steps.determine.outputs.agent != 'skip'
        run: cd agents && npx tsx cron/runner.ts ${{ steps.determine.outputs.agent }} ${{ steps.determine.outputs.task }}
