name: Agents — Design & Marketing Loop
on:
  schedule:
    # 09:05 KST = 00:05 UTC — 광고 성과 수집 + 소재 최적화 의사결정
    - cron: "5 0 * * *"
  workflow_dispatch:
    inputs:
      agent:
        description: "에이전트 (design)"
        required: true
        default: "design"
      task:
        description: "태스크 (ads-loop)"
        required: true
        default: "ads-loop"

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5-20251001
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GOOGLE_ADS_EMAIL: ${{ secrets.GOOGLE_ADS_EMAIL }}
  GOOGLE_ADS_PASSWORD: ${{ secrets.GOOGLE_ADS_PASSWORD }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  run-design-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Determine agent and task
        id: determine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "agent=${{ github.event.inputs.agent }}" >> $GITHUB_OUTPUT
            echo "task=${{ github.event.inputs.task }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            case "$CRON" in
              "5 0 * * *")
                echo "agent=design" >> $GITHUB_OUTPUT; echo "task=ads-loop" >> $GITHUB_OUTPUT ;;
              *)
                echo "agent=skip" >> $GITHUB_OUTPUT; echo "task=skip" >> $GITHUB_OUTPUT ;;
            esac
          fi

      # Playwright: Google Ads 스크래핑용
      - name: Install Playwright Chromium
        if: steps.determine.outputs.task == 'ads-loop'
        run: npx playwright install chromium --with-deps

      - name: Run design agent
        if: steps.determine.outputs.agent != 'skip'
        run: cd agents && npx tsx cron/runner.ts ${{ steps.determine.outputs.agent }} ${{ steps.determine.outputs.task }}
