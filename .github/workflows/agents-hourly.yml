name: Agents — Hourly
on:
  schedule:
    # 4시간마다 (UTC) — 비용 최적화: 2시간 → 4시간
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "실행할 태스크 (health-check, error-monitor, anomaly-detector)"
        required: true
        default: "health-check"

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  SITE_URL: ${{ secrets.SITE_URL }}

jobs:
  health-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.task == 'health-check'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cto health-check

  error-monitor:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.task == 'error-monitor'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cto error-monitor

  anomaly-detector:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.task == 'anomaly-detector'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cdo anomaly-detector
