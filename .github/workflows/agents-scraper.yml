name: "Agents — Community Scraper"

on:
  workflow_dispatch:
    inputs:
      step:
        description: "실행 단계 (sheet-scrape)"
        required: true
        default: "sheet-scrape"
        type: choice
        options:
          - sheet-scrape

  # 오유/네이트판 — 5회/일 (펨코는 로컬 Mac launchd 전용, Cloudflare 차단)
  # 로컬 펨코 스케줄: 11:30 KST + 21:30 KST (GHA와 30분 이상 간격, 사이트 분리로 충돌 없음)
  schedule:
    - cron: "30 22 * * *"  # 07:30 KST
    - cron: "0 0 * * *"    # 09:00 KST
    - cron: "0 3 * * *"    # 12:00 KST
    - cron: "0 6 * * *"    # 15:00 KST
    - cron: "0 12 * * *"   # 21:00 KST

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  CLAUDE_MODEL_STRATEGIC: claude-opus-4-7
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  SHEETS_SCRAPER_ID: ${{ secrets.SHEETS_SCRAPER_ID }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
  CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
  CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
  NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  sheet-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: ${{ github.event_name == 'schedule' || github.event.inputs.step == 'sheet-scrape' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Verify system Chrome
        run: google-chrome-stable --version

      # GIF → mp4 변환용 (image-pipeline.ts convertGifToMp4) — 미설치 시 GIF는 placeholder fallback
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Sheet Scraper (펨코·뿜 제외 — 로컬 Mac에서 처리)
        run: cd agents && npx tsx cron/runner.ts community sheet-scrape
        env:
          # fmkorea(Cloudflare) + bboom(naver GHA 봇 차단 리스크) → 로컬 launchd 전용
          SHEET_SCRAPER_EXCLUDE_SITE: fmkorea,bboom
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
          # 제목 SEO 다듬기 ON (agent-lifecycle.md: .env.local SHEET_TITLE_SEO와 동일 유지)
          SHEET_TITLE_SEO: 'true'
