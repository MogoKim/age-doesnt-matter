name: Agents — Seed Content
on:
  schedule:
    # 09,10,11,13,14,16,17,19,20,21,22 KST + 00,01 KST(심야) → UTC 변환 (13 슬롯)
    # 05:00 UTC(14:00 KST) 제거 — coo:content-scheduler(agents-daily.yml)와 충돌 방지
    - cron: "2 0,1,2,4,6,7,8,10,11,12,13,15,16 * * *"
  workflow_dispatch:

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
  UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
  AGENT_DB_POOL_MAX: "1"
  ENABLE_SEED_POSTS: 'false'
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - name: Run Seed Scheduler
        run: |
          run_with_db_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -Eq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              return "$status"
            fi

            echo "::warning::$label hit transient DB connection failure; waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -Eq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              echo "::warning::$label still hit transient DB connection failure after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          # cron-link-check: runner.ts seed scheduler
          run_with_db_retry "seed scheduler" bash -lc "cd agents && npx tsx cron/runner.ts seed scheduler"
      - name: Run Controversy Chain
        run: |
          run_with_db_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -Eq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              return "$status"
            fi

            echo "::warning::$label hit transient DB connection failure; waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -Eq "EMAXCONN|Connection terminated due to connection timeout|Connection terminated unexpectedly"; then
              echo "::warning::$label still hit transient DB connection failure after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          # cron-link-check: runner.ts controversy-chain execute
          run_with_db_retry "controversy chain" bash -lc "cd agents && npx tsx cron/runner.ts controversy-chain execute"
