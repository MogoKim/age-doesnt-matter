name: "Agents — Sheet Viral Waves"

on:
  workflow_dispatch:

  # 5분마다 실행 (파동 타이밍: +1분/+3분/+6분/+10분 — 글 발행 후 최대 15분 내 전부 완료)
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *" # cafe comment wave와 시작 분산

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  AGENT_DB_POOL_MAX: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  viral-waves:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci

      - name: Run Sheet Viral Waves
        run: |
          # cron-link-check: runner.ts seed viral-waves
          run_with_emaxconn_retry() {
            local label="$1"
            shift
            local output
            local status

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if ! echo "$output" | grep -q "EMAXCONN"; then
              return "$status"
            fi

            echo "::warning::$label hit DB connection limit (EMAXCONN); waiting 45s and retrying once."
            sleep 45

            set +e
            output=$("$@" 2>&1)
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$output" | grep -q "EMAXCONN"; then
              echo "::warning::$label still hit EMAXCONN after retry; skipping this tick. The next scheduled run will retry."
              return 0
            fi

            return "$status"
          }

          run_with_emaxconn_retry "sheet viral wave" bash -lc "cd agents && npx tsx cron/runner.ts seed viral-waves"
