    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'knowledge-responder' ||
      github.event_name == 'schedule' && github.event.schedule == '0 3 * * 2,4,6'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo knowledge-responder
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
          SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
          SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
          SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
          SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
          SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}

  seo-optimizer:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'seo-optimizer' ||
      github.event_name == 'schedule' && github.event.schedule == '0 23 * * 0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo seo-optimizer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_LIGHT: claude-haiku-4-5
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
          SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
          SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
          SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
          SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
          SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}

  test-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'test-validate'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cmo/test-platforms.ts validate
        env:
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
