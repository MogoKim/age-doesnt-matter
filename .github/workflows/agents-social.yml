name: "Agents — Social Marketing"

on:
  workflow_dispatch:
    inputs:
      task:
        description: "실행할 태스크 (social-poster, social-metrics, social-reviewer, social-strategy, threads-token-refresh)"
        required: true
        default: "social-poster"
  schedule:
    # 게시 슬롯 (매일)
    - cron: "0 0 * * *"    # 09:00 KST — 아침 (정보형/건강)
    - cron: "0 6 * * *"    # 15:00 KST — 오후 (커뮤니티/하이라이트)
    - cron: "0 10 * * *"   # 19:00 KST — 저녁 (감성/향수/유머)
    # 메트릭 수집 (매일)
    - cron: "0 11 * * *"   # 20:00 KST — 성과 수집
    # 월요일 회의 (주 1회)
    - cron: "0 1 * * 1"    # 월 10:00 KST — reviewer
    - cron: "15 1 * * 1"   # 월 10:15 KST — strategy
    # Threads 토큰 갱신 (주 1회)
    - cron: "0 1 * * 3"    # 수 10:00 KST — threads token refresh

jobs:
  social-poster:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'social-poster' ||
      github.event_name == 'schedule' && (github.event.schedule == '0 0 * * *' || github.event.schedule == '0 6 * * *' || github.event.schedule == '0 10 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo social-poster
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_LIGHT: claude-haiku-4-5
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_CEO_FOUNDER: ${{ secrets.SLACK_CHANNEL_CEO_FOUNDER }}
          SLACK_CHANNEL_DAILY_BRIEFING: ${{ secrets.SLACK_CHANNEL_DAILY_BRIEFING }}
          SLACK_CHANNEL_WEEKLY_REPORT: ${{ secrets.SLACK_CHANNEL_WEEKLY_REPORT }}
          SLACK_CHANNEL_AGENT_MEETING: ${{ secrets.SLACK_CHANNEL_AGENT_MEETING }}
          SLACK_CHANNEL_MEETING_LOG: ${{ secrets.SLACK_CHANNEL_MEETING_LOG }}
          SLACK_CHANNEL_ALERT_URGENT: ${{ secrets.SLACK_CHANNEL_ALERT_URGENT }}
          SLACK_CHANNEL_ALERT_SYSTEM: ${{ secrets.SLACK_CHANNEL_ALERT_SYSTEM }}
          SLACK_CHANNEL_ALERT_KPI: ${{ secrets.SLACK_CHANNEL_ALERT_KPI }}
          SLACK_CHANNEL_LOG_JOBS: ${{ secrets.SLACK_CHANNEL_LOG_JOBS }}
          SLACK_CHANNEL_LOG_CONTENT: ${{ secrets.SLACK_CHANNEL_LOG_CONTENT }}
          SLACK_CHANNEL_LOG_MARKETING: ${{ secrets.SLACK_CHANNEL_LOG_MARKETING }}
          SLACK_CHANNEL_LOG_COST: ${{ secrets.SLACK_CHANNEL_LOG_COST }}
          SLACK_CHANNEL_EXPERIMENT: ${{ secrets.SLACK_CHANNEL_EXPERIMENT }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.AUTH_URL }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

  social-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'social-metrics' ||
      github.event_name == 'schedule' && github.event.schedule == '0 11 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo social-metrics
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_CEO_FOUNDER: ${{ secrets.SLACK_CHANNEL_CEO_FOUNDER }}
          SLACK_CHANNEL_DAILY_BRIEFING: ${{ secrets.SLACK_CHANNEL_DAILY_BRIEFING }}
          SLACK_CHANNEL_WEEKLY_REPORT: ${{ secrets.SLACK_CHANNEL_WEEKLY_REPORT }}
          SLACK_CHANNEL_AGENT_MEETING: ${{ secrets.SLACK_CHANNEL_AGENT_MEETING }}
          SLACK_CHANNEL_MEETING_LOG: ${{ secrets.SLACK_CHANNEL_MEETING_LOG }}
          SLACK_CHANNEL_ALERT_URGENT: ${{ secrets.SLACK_CHANNEL_ALERT_URGENT }}
          SLACK_CHANNEL_ALERT_SYSTEM: ${{ secrets.SLACK_CHANNEL_ALERT_SYSTEM }}
          SLACK_CHANNEL_ALERT_KPI: ${{ secrets.SLACK_CHANNEL_ALERT_KPI }}
          SLACK_CHANNEL_LOG_JOBS: ${{ secrets.SLACK_CHANNEL_LOG_JOBS }}
          SLACK_CHANNEL_LOG_CONTENT: ${{ secrets.SLACK_CHANNEL_LOG_CONTENT }}
          SLACK_CHANNEL_LOG_MARKETING: ${{ secrets.SLACK_CHANNEL_LOG_MARKETING }}
          SLACK_CHANNEL_LOG_COST: ${{ secrets.SLACK_CHANNEL_LOG_COST }}
          SLACK_CHANNEL_EXPERIMENT: ${{ secrets.SLACK_CHANNEL_EXPERIMENT }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

  social-reviewer:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'social-reviewer' ||
      github.event_name == 'schedule' && github.event.schedule == '0 1 * * 1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo social-reviewer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_LIGHT: claude-haiku-4-5
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_CEO_FOUNDER: ${{ secrets.SLACK_CHANNEL_CEO_FOUNDER }}
          SLACK_CHANNEL_DAILY_BRIEFING: ${{ secrets.SLACK_CHANNEL_DAILY_BRIEFING }}
          SLACK_CHANNEL_WEEKLY_REPORT: ${{ secrets.SLACK_CHANNEL_WEEKLY_REPORT }}
          SLACK_CHANNEL_AGENT_MEETING: ${{ secrets.SLACK_CHANNEL_AGENT_MEETING }}
          SLACK_CHANNEL_MEETING_LOG: ${{ secrets.SLACK_CHANNEL_MEETING_LOG }}
          SLACK_CHANNEL_ALERT_URGENT: ${{ secrets.SLACK_CHANNEL_ALERT_URGENT }}
          SLACK_CHANNEL_ALERT_SYSTEM: ${{ secrets.SLACK_CHANNEL_ALERT_SYSTEM }}
          SLACK_CHANNEL_ALERT_KPI: ${{ secrets.SLACK_CHANNEL_ALERT_KPI }}
          SLACK_CHANNEL_LOG_JOBS: ${{ secrets.SLACK_CHANNEL_LOG_JOBS }}
          SLACK_CHANNEL_LOG_CONTENT: ${{ secrets.SLACK_CHANNEL_LOG_CONTENT }}
          SLACK_CHANNEL_LOG_MARKETING: ${{ secrets.SLACK_CHANNEL_LOG_MARKETING }}
          SLACK_CHANNEL_LOG_COST: ${{ secrets.SLACK_CHANNEL_LOG_COST }}
          SLACK_CHANNEL_EXPERIMENT: ${{ secrets.SLACK_CHANNEL_EXPERIMENT }}

  social-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'social-strategy' ||
      github.event_name == 'schedule' && github.event.schedule == '15 1 * * 1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo social-strategy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_CEO_FOUNDER: ${{ secrets.SLACK_CHANNEL_CEO_FOUNDER }}
          SLACK_CHANNEL_DAILY_BRIEFING: ${{ secrets.SLACK_CHANNEL_DAILY_BRIEFING }}
          SLACK_CHANNEL_WEEKLY_REPORT: ${{ secrets.SLACK_CHANNEL_WEEKLY_REPORT }}
          SLACK_CHANNEL_AGENT_MEETING: ${{ secrets.SLACK_CHANNEL_AGENT_MEETING }}
          SLACK_CHANNEL_MEETING_LOG: ${{ secrets.SLACK_CHANNEL_MEETING_LOG }}
          SLACK_CHANNEL_ALERT_URGENT: ${{ secrets.SLACK_CHANNEL_ALERT_URGENT }}
          SLACK_CHANNEL_ALERT_SYSTEM: ${{ secrets.SLACK_CHANNEL_ALERT_SYSTEM }}
          SLACK_CHANNEL_ALERT_KPI: ${{ secrets.SLACK_CHANNEL_ALERT_KPI }}
          SLACK_CHANNEL_LOG_JOBS: ${{ secrets.SLACK_CHANNEL_LOG_JOBS }}
          SLACK_CHANNEL_LOG_CONTENT: ${{ secrets.SLACK_CHANNEL_LOG_CONTENT }}
          SLACK_CHANNEL_LOG_MARKETING: ${{ secrets.SLACK_CHANNEL_LOG_MARKETING }}
          SLACK_CHANNEL_LOG_COST: ${{ secrets.SLACK_CHANNEL_LOG_COST }}
          SLACK_CHANNEL_EXPERIMENT: ${{ secrets.SLACK_CHANNEL_EXPERIMENT }}

  threads-token-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'threads-token-refresh' ||
      github.event_name == 'schedule' && github.event.schedule == '0 1 * * 3'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cmo/platforms/threads-token-refresh.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_CEO_FOUNDER: ${{ secrets.SLACK_CHANNEL_CEO_FOUNDER }}
          SLACK_CHANNEL_ALERT_URGENT: ${{ secrets.SLACK_CHANNEL_ALERT_URGENT }}
          SLACK_CHANNEL_ALERT_SYSTEM: ${{ secrets.SLACK_CHANNEL_ALERT_SYSTEM }}
          SLACK_CHANNEL_LOG_MARKETING: ${{ secrets.SLACK_CHANNEL_LOG_MARKETING }}
          THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
