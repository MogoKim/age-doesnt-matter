name: "Agents — Social Marketing"

on:
  workflow_dispatch:
    inputs:
      task:
        description: "실행할 태스크"
        required: true
        default: "social-poster"
        type: choice
        options:
          - social-poster
          - social-poster-visual
          - social-metrics
          - social-reviewer
          - social-strategy
          - channel-seeder
          - knowledge-responder
          - seo-optimizer
          - threads-token-refresh
          - test-validate
          - test-post
  schedule:
    # 텍스트 게시 (Threads/X) — 황금 시간대
    - cron: "0 22 * * *"   # 07:00 KST — 아침 황금시간
    - cron: "0 3 * * *"    # 12:00 KST — 점심 황금시간
    # 카드뉴스 v2 게시 (IG/FB/Threads) — 오후 황금시간
    - cron: "0 6 * * *"    # 15:00 KST — 오후 황금시간
    # 채널 시딩 (카카오/지식인/커뮤니티 초안)
    - cron: "30 2 * * *"   # 11:30 KST — 채널 초안
    # 메트릭 수집
    - cron: "0 11 * * *"   # 20:00 KST — 성과 수집
    # 3일 주기 리뷰 (월+목)
    - cron: "0 1 * * 1,4"    # 월+목 10:00 KST — reviewer
    - cron: "15 1 * * 1,4"   # 월+목 10:15 KST — strategy
    # 주간 SEO
    - cron: "0 23 * * 0"   # 월 08:00 KST — SEO 모니터
    # 지식인 답변 초안 (주 3회: 화/목/토)
    - cron: "0 3 * * 2,4,6" # 12:00 KST — knowledge-responder
    # Threads 토큰 갱신
    - cron: "0 1 * * 3"    # 수 10:00 KST — threads token refresh

jobs:
  social-poster:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'social-poster' ||
      github.event_name == 'schedule' && (github.event.schedule == '0 22 * * *' || github.event.schedule == '0 3 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo social-poster
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_LIGHT: claude-haiku-4-5
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
          SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
          SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
          SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
          SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
          SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.AUTH_URL }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

  social-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'social-metrics' ||
      github.event_name == 'schedule' && github.event.schedule == '0 11 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo social-metrics
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
          SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
          SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
          SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
          SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
          SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

  social-reviewer:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'social-reviewer' ||
      github.event_name == 'schedule' && github.event.schedule == '0 1 * * 1,4'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo social-reviewer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_LIGHT: claude-haiku-4-5
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
          SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
          SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
          SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
          SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
          SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}

  social-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'social-strategy' ||
      github.event_name == 'schedule' && github.event.schedule == '15 1 * * 1,4'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo social-strategy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_STRATEGIC: ${{ secrets.CLAUDE_MODEL_STRATEGIC }}
          CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
          SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
          SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
          SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
          SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
          SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}

  threads-token-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'threads-token-refresh' ||
      github.event_name == 'schedule' && github.event.schedule == '0 1 * * 3'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: cd agents && npx tsx cron/runner.ts cmo threads-token-refresh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
          SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
          SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
          SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
          SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
          SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
          THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

  social-poster-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'social-poster-visual' ||
      github.event_name == 'schedule' && github.event.schedule == '0 6 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - run: npx playwright install chromium --with-deps
      - run: cd agents && npx tsx cron/runner.ts cmo social-poster-visual
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
