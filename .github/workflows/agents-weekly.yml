name: Agents — Weekly
on:
  schedule:
    # 월/수/목/금 09:05 KST = 00:05 UTC — CMO/CPO/Strategist (DOW 분기)
    # - cron: "5 0 * * 1,3,4,5"  # 전 DOW 케이스 skip 처리 2026-05-16 — 비활성화
    # 월요일 09:30 KST = 00:30 UTC — CTO 코드 품질 가비지 컬렉션
    - cron: "30 0 * * 1"
  workflow_dispatch:
    inputs:
      agent:
        description: "에이전트 (cmo, cpo, strategist, cto)"
        required: true
      task:
        description: "태스크"
        required: true

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_STRATEGIC: ${{ secrets.CLAUDE_MODEL_STRATEGIC }}
  CLAUDE_MODEL_HEAVY: claude-sonnet-4-6
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}
  SITE_URL: ${{ secrets.SITE_URL }}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: cd agents && npm ci
      - name: Determine agent and task
        id: determine
        env:
          INPUT_AGENT: ${{ github.event.inputs.agent }}
          INPUT_TASK: ${{ github.event.inputs.task }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # injection 방지: 입력을 env로 받고 allowlist 검증 (소문자·숫자·:_- 만)
            if [[ ! "$INPUT_AGENT" =~ ^[a-z0-9:_-]+$ ]] || [[ -n "$INPUT_TASK" && ! "$INPUT_TASK" =~ ^[a-z0-9:_-]+$ ]]; then
              echo "::error::허용되지 않은 agent/task 입력"; exit 1
            fi
            echo "agent=$INPUT_AGENT" >> $GITHUB_OUTPUT
            echo "task=$INPUT_TASK" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            DOW=$(date -u +%u)  # 1=Mon, 3=Wed, 4=Thu, 5=Fri
            case "$CRON" in
              "5 0 * * 1,3,4,5")
                case "$DOW" in
                  1) echo "agent=skip" >> $GITHUB_OUTPUT; echo "task=skip" >> $GITHUB_OUTPUT ;; # cmo:source-expander 중단 2026-05-16
                  3) echo "agent=skip" >> $GITHUB_OUTPUT; echo "task=skip" >> $GITHUB_OUTPUT ;; # cpo:persona-diversity-checker 중단 2026-05-16
                  4) echo "agent=skip" >> $GITHUB_OUTPUT; echo "task=skip" >> $GITHUB_OUTPUT ;; # strategist:user-deep-analysis 중단 2026-05-16
                  5) echo "agent=skip" >> $GITHUB_OUTPUT; echo "task=skip" >> $GITHUB_OUTPUT ;; # cmo:content-gap-finder 중단 2026-05-16
                  *) echo "agent=skip" >> $GITHUB_OUTPUT; echo "task=skip" >> $GITHUB_OUTPUT ;;
                esac ;;
              "30 0 * * 1")
                echo "agent=cto" >> $GITHUB_OUTPUT; echo "task=garbage-collect" >> $GITHUB_OUTPUT ;;
              *)
                echo "agent=skip" >> $GITHUB_OUTPUT; echo "task=skip" >> $GITHUB_OUTPUT ;;
            esac
          fi
      - name: Run agent
        if: steps.determine.outputs.agent != 'skip'
        run: cd agents && npx tsx cron/runner.ts ${{ steps.determine.outputs.agent }} ${{ steps.determine.outputs.task }}
