name: Post-Deploy QA (Gate 2)

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: "테스트할 URL"
        required: false
        default: "https://age-doesnt-matter.com"

env:
  SITE_URL: ${{ secrets.SITE_URL }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}

concurrency:
  group: post-deploy-qa
  cancel-in-progress: true

jobs:
  gate2:
    name: code-gate-post-deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       startsWith(github.event.deployment_status.environment, 'Production'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      # ── 1. 스모크 테스트 ──────────────────────────────────
      - name: Smoke Test
        id: smoke
        continue-on-error: true
        run: |
          URL="${{ github.event.inputs.url || env.SITE_URL }}"
          npx tsx scripts/smoke-test.ts --url "$URL" > smoke-result.json 2>smoke-stderr.log || true

      # ── 2. 크론 연결 검증 ─────────────────────────────────
      - name: Cron Link Verification
        id: cron
        continue-on-error: true
        run: npx tsx scripts/check-cron-links.ts > cron-result.json 2>&1

      # ── 3. 광고 렌더링 ───────────────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Get Deploy URL
        id: deploy-url
        run: |
          # deployment_status 이벤트에서 실제 배포 URL 추출 (Vercel Preview 포함)
          DEPLOY_URL="${{ github.event.deployment_status.target_url }}"
          FALLBACK_URL="${{ github.event.inputs.url || env.SITE_URL }}"
          FINAL_URL="${DEPLOY_URL:-$FALLBACK_URL}"
          echo "url=$FINAL_URL" >> $GITHUB_OUTPUT
          echo "배포 URL: $FINAL_URL"

      - name: Ad Verification (Browser)
        id: ad-verify
        continue-on-error: true
        env:
          E2E_BASE_URL: ${{ steps.deploy-url.outputs.url }}
        run: |
          npx playwright test e2e/07-ad-verification.spec.ts \
            --project=chromium \
            --project=mobile-chrome \
            --reporter=json > ad-verify-result.json 2>&1 || true

      # ── 4. Visual QA (Claude Haiku — 시각적 UI 이상 감지) ──
      - name: Visual QA
        id: visual-qa
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
        run: |
          npx tsx scripts/visual-qa.ts --url "${{ steps.deploy-url.outputs.url }}" > visual-qa-result.json 2>&1 || true

      # ── 5. Lighthouse CI (프로덕션 URL 직접 — 접근성/SEO) ──
      - name: Lighthouse CI
        id: lighthouse
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.prod.json
          uploadArtifacts: false
          temporaryPublicStorage: false
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      # ── 6. QA 결과 아티팩트 저장 ─────────────────────────
      - name: Upload QA Results
        uses: actions/upload-artifact@v4
        with:
          name: qa-results-${{ github.run_number }}
          path: |
            smoke-result.json
            cron-result.json
            ad-verify-result.json
            visual-qa-result.json
          retention-days: 30

      # ── 5. Gate 2 에이전트 실행 (항상 실행, 결과에 따라 판정) ──
      - name: Setup agents
        run: |
          npx prisma generate
          cd agents && npm ci

      - name: Gate 2 — QA Deploy Audit
        env:
          QA_SMOKE_RESULT: ${{ steps.smoke.outcome }}
          QA_CRON_RESULT: ${{ steps.cron.outcome }}
          QA_AD_VERIFY_RESULT: ${{ steps.ad-verify.outcome }}
          QA_VISUAL_QA_RESULT: ${{ steps.visual-qa.outcome }}
          QA_LIGHTHOUSE_RESULT: ${{ steps.lighthouse.outcome }}
          QA_ALL_PASSED: ${{ (steps.smoke.outcome == 'success' && steps.cron.outcome == 'success' && steps.ad-verify.outcome == 'success' && steps.visual-qa.outcome != 'failure') && 'true' || 'false' }}
          QA_COMMIT_SHA: ${{ github.sha }}
          QA_COMMIT_MSG: ${{ github.event.deployment.description || github.event.head_commit.message || '' }}
          QA_DEPLOY_URL: ${{ steps.deploy-url.outputs.url }}
        run: cd agents && npx tsx cron/runner.ts qa deploy-audit
