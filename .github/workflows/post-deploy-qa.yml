name: Post-Deploy QA

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: "테스트할 URL"
        required: false
        default: "https://age-doesnt-matter.com"

env:
  SITE_URL: ${{ secrets.SITE_URL }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_MODEL_LIGHT: claude-haiku-4-5
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
  SLACK_CHANNEL_DASHBOARD: ${{ secrets.SLACK_CHANNEL_DASHBOARD }}
  SLACK_CHANNEL_REPORT: ${{ secrets.SLACK_CHANNEL_REPORT }}
  SLACK_CHANNEL_QA: ${{ secrets.SLACK_CHANNEL_QA }}
  SLACK_CHANNEL_SYSTEM: ${{ secrets.SLACK_CHANNEL_SYSTEM }}
  SLACK_CHANNEL_LOG: ${{ secrets.SLACK_CHANNEL_LOG }}
  SLACK_CHANNEL_AGENT: ${{ secrets.SLACK_CHANNEL_AGENT }}

concurrency:
  group: post-deploy-qa
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       startsWith(github.event.deployment_status.environment, 'Production'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Smoke Test
        id: smoke
        continue-on-error: true
        run: |
          URL="${{ github.event.inputs.url || env.SITE_URL }}"
          npx tsx scripts/smoke-test.ts --url "$URL" > smoke-result.json

      - name: Cron Link Verification
        id: cron
        continue-on-error: true
        run: npx tsx scripts/check-cron-links.ts > cron-result.json

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Ad Verification (Browser)
        id: ad-verify
        continue-on-error: true
        env:
          E2E_BASE_URL: ${{ github.event.inputs.url || env.SITE_URL }}
        run: |
          npx playwright test e2e/07-ad-verification.spec.ts \
            --project=chromium \
            --project=mobile-chrome \
            --reporter=json > ad-verify-result.json 2>&1 || true

      - name: Upload QA Results
        uses: actions/upload-artifact@v4
        with:
          name: qa-results
          path: |
            smoke-result.json
            cron-result.json
            ad-verify-result.json
          retention-days: 30

      - name: QA Failed — Agent Verify
        if: >-
          steps.smoke.outcome == 'failure' ||
          steps.cron.outcome == 'failure' ||
          steps.ad-verify.outcome == 'failure'
        env:
          QA_SMOKE_RESULT: ${{ steps.smoke.outcome }}
          QA_CRON_RESULT: ${{ steps.cron.outcome }}
          QA_AD_VERIFY_RESULT: ${{ steps.ad-verify.outcome }}
        run: |
          npx prisma generate
          cd agents && npm ci
          npx tsx cron/runner.ts cto qa-verify

      - name: QA Passed — Agent Notify
        if: >-
          steps.smoke.outcome == 'success' &&
          steps.cron.outcome == 'success' &&
          steps.ad-verify.outcome == 'success'
        env:
          QA_SMOKE_RESULT: ${{ steps.smoke.outcome }}
          QA_CRON_RESULT: ${{ steps.cron.outcome }}
          QA_AD_VERIFY_RESULT: ${{ steps.ad-verify.outcome }}
          QA_ALL_PASSED: "true"
        run: |
          npx prisma generate
          cd agents && npm ci
          npx tsx cron/runner.ts cto qa-verify
