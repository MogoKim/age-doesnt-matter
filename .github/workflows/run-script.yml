name: Run Script (일회성)
on:
  workflow_dispatch:
    inputs:
      script:
        description: "실행할 스크립트 경로 (예: scripts/fix-magazine-thumbnails.ts)"
        required: true
        type: string
      args:
        description: "추가 인자 (예: --dry-run)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
  CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
  CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
  NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - name: Run script
        env:
          SCRIPT_PATH: ${{ inputs.script }}
          SCRIPT_ARGS: ${{ inputs.args }}
        run: |
          # injection 방지: 입력을 env로 받고 경로 allowlist 검증 (scripts/ 또는 agents/ 하위 .ts만)
          if [[ ! "$SCRIPT_PATH" =~ ^(scripts|agents)/[a-zA-Z0-9/_-]+\.ts$ ]]; then
            echo "::error::허용되지 않은 스크립트 경로: $SCRIPT_PATH"; exit 1
          fi
          npx tsx "$SCRIPT_PATH" $SCRIPT_ARGS
