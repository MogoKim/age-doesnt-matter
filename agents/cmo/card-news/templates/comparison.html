<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1A1A1A;
  line-height: 1.6;
}

.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* Category color variables — defaults */
.card { --cat-primary: #FF6F61; --cat-accent: #FF6F61; }
.card[data-category="WELLNESS"] { --cat-primary: #2E7D32; --cat-accent: #4CAF50; background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
.card[data-category="PRACTICAL"] { --cat-primary: #1565C0; --cat-accent: #2196F3; background: linear-gradient(135deg, #E3F2FD, #BBDEFB); }
.card[data-category="COMMUNITY"] { --cat-primary: #E65100; --cat-accent: #FF9800; background: linear-gradient(135deg, #FFF3E0, #FFE0B2); }
.card[data-category="LIFESTYLE"] { --cat-primary: #6A1B9A; --cat-accent: #9C27B0; background: linear-gradient(135deg, #F3E5F5, #E1BEE7); }
.card[data-category="GROWTH"] { --cat-primary: #00695C; --cat-accent: #009688; background: linear-gradient(135deg, #E0F2F1, #B2DFDB); }
.card[data-category="TRENDING"] { --cat-primary: #AD1457; --cat-accent: #E91E63; background: linear-gradient(135deg, #FCE4EC, #F8BBD0); }

.card-inner {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 100px 60px 60px;
  position: relative; z-index: 2;
}

.title {
  font-size: 42px; font-weight: 800;
  color: var(--cat-primary);
  line-height: 1.3; letter-spacing: -0.5px;
  margin-bottom: 56px; word-break: keep-all;
  text-align: center;
}

/* VS divider */
.vs-badge {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 72px; height: 72px;
  border-radius: 50%;
  background: #FF6F61;
  color: #fff;
  font-size: 26px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(255, 111, 97, 0.4);
  z-index: 5;
  letter-spacing: 1px;
}

.comparison-grid {
  display: flex; gap: 28px;
  width: 100%; position: relative;
}

.comparison-side {
  flex: 1;
  border-radius: 28px;
  padding: 56px 40px;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  min-height: 500px;
  justify-content: center;
}

.side-left {
  background: rgba(255, 255, 255, 0.7);
  border: 2px solid rgba(0, 0, 0, 0.06);
}

.side-right {
  background: var(--cat-accent);
  color: #fff;
}

.side-icon {
  font-size: 56px; margin-bottom: 24px;
}

.side-label {
  font-size: 30px; font-weight: 800;
  margin-bottom: 32px;
  letter-spacing: 1px;
}

.side-left .side-label { color: #888; }
.side-right .side-label { color: rgba(255, 255, 255, 0.9); }

.side-text {
  font-size: 28px; font-weight: 400;
  line-height: 1.7; word-break: keep-all;
}

.side-left .side-text { color: #666; }
.side-right .side-text { color: rgba(255, 255, 255, 0.95); }

/* Slide indicator */
.slide-indicator {
  position: absolute; top: 40px; right: 48px;
  font-size: 22px; font-weight: 600;
  color: var(--cat-primary);
  background: rgba(255, 255, 255, 0.7);
  border-radius: 24px; padding: 6px 20px; z-index: 10;
}

.brand-footer {
  width: 100%; padding: 28px 48px;
  text-align: center; font-size: 22px; font-weight: 500;
  color: #fff; letter-spacing: 0.5px;
  background: var(--cat-primary);
}
</style>
</head>
<body>
<div class="card comparison" data-category="{{category}}">
  <div class="slide-indicator">{{slideNumber}} / {{totalSlides}}</div>
  <div class="card-inner">
    <div class="title">{{title}}</div>
    <div class="comparison-grid">
      <div class="comparison-side side-left">
        <div class="side-icon">&#10060;</div>
        <div class="side-label">{{leftLabel}}</div>
        <div class="side-text">{{leftText}}</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="comparison-side side-right">
        <div class="side-icon">&#10004;</div>
        <div class="side-label">{{rightLabel}}</div>
        <div class="side-text">{{rightText}}</div>
      </div>
    </div>
  </div>
  <div class="brand-footer">우리 나이가 어때서 | age-doesnt-matter.com</div>
</div>
</body>
</html>
