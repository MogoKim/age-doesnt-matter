<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1A1A1A;
  line-height: 1.6;
}

.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  background: #F5F5F5;
}

/* Category color variables — defaults */
.card { --cat-primary: #FF6F61; --cat-accent: #FF6F61; }
.card[data-category="WELLNESS"] { --cat-primary: #2E7D32; --cat-accent: #4CAF50; }
.card[data-category="PRACTICAL"] { --cat-primary: #1565C0; --cat-accent: #2196F3; }
.card[data-category="COMMUNITY"] { --cat-primary: #E65100; --cat-accent: #FF9800; }
.card[data-category="LIFESTYLE"] { --cat-primary: #6A1B9A; --cat-accent: #9C27B0; }
.card[data-category="GROWTH"] { --cat-primary: #00695C; --cat-accent: #009688; }
.card[data-category="TRENDING"] { --cat-primary: #AD1457; --cat-accent: #E91E63; }

/* Top half: image */
.image-section {
  width: 100%; height: 675px;
  position: relative; overflow: hidden;
}

.bg-image {
  width: 100%; height: 100%;
  object-fit: cover;
}

.image-fade {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(180deg, transparent, #fff);
}

/* Bottom half: content */
.content-section {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center;
  padding: 48px 72px;
  background: #fff;
}

.accent-line {
  width: 80px; height: 6px;
  border-radius: 3px;
  background: var(--cat-accent);
  margin-bottom: 28px;
}

.title {
  font-size: 40px; font-weight: 800;
  color: var(--cat-primary);
  line-height: 1.3; letter-spacing: -0.5px;
  margin-bottom: 24px; word-break: keep-all;
}

.body-text {
  font-size: 30px; font-weight: 400;
  line-height: 1.7; color: #4A4A4A;
  word-break: keep-all;
}

/* Slide indicator */
.slide-indicator {
  position: absolute; top: 40px; right: 48px;
  font-size: 22px; font-weight: 600;
  color: rgba(255, 255, 255, 0.85);
  background: rgba(0, 0, 0, 0.25);
  border-radius: 24px; padding: 6px 20px; z-index: 10;
}

.brand-footer {
  width: 100%; padding: 28px 48px;
  text-align: center; font-size: 22px; font-weight: 500;
  color: #fff; letter-spacing: 0.5px;
  background: var(--cat-primary);
}
</style>
</head>
<body>
<div class="card context" data-category="{{category}}">
  <div class="slide-indicator">{{slideNumber}} / {{totalSlides}}</div>
  <div class="image-section">
    <img class="bg-image" src="{{imageUrl}}" alt="">
    <div class="image-fade"></div>
  </div>
  <div class="content-section">
    <div class="accent-line"></div>
    <div class="title">{{title}}</div>
    <div class="body-text">{{body}}</div>
  </div>
  <div class="brand-footer">우리 나이가 어때서 | age-doesnt-matter.com</div>
</div>
</body>
</html>
