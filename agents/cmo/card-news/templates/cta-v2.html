<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1A1A1A;
  line-height: 1.6;
}

.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, #FF6F61 0%, #FF8A65 40%, #FFAB91 100%);
}

/* Category overrides */
.card[data-category="WELLNESS"] { background: linear-gradient(135deg, #2E7D32, #4CAF50, #81C784); }
.card[data-category="PRACTICAL"] { background: linear-gradient(135deg, #1565C0, #2196F3, #64B5F6); }
.card[data-category="COMMUNITY"] { background: linear-gradient(135deg, #E65100, #FF9800, #FFB74D); }
.card[data-category="LIFESTYLE"] { background: linear-gradient(135deg, #6A1B9A, #9C27B0, #CE93D8); }
.card[data-category="GROWTH"] { background: linear-gradient(135deg, #00695C, #009688, #80CBC4); }
.card[data-category="TRENDING"] { background: linear-gradient(135deg, #AD1457, #E91E63, #F48FB1); }

/* Decorative circles */
.deco-circle-1 {
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.08);
  top: -100px; right: -80px;
}

.deco-circle-2 {
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.06);
  bottom: 120px; left: -60px;
}

.card-inner {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 100px 72px 60px;
  position: relative; z-index: 2;
}

.brand-name {
  font-size: 44px; font-weight: 900;
  color: #fff;
  line-height: 1.3;
  margin-bottom: 20px;
  word-break: keep-all;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
}

.accent-line {
  width: 80px; height: 4px;
  border-radius: 2px;
  background: rgba(255, 255, 255, 0.5);
  margin: 0 auto 40px;
}

.title {
  font-size: 40px; font-weight: 700;
  color: rgba(255, 255, 255, 0.95);
  line-height: 1.4;
  margin-bottom: 24px;
  word-break: keep-all;
}

.cta-text {
  font-size: 32px; font-weight: 400;
  color: rgba(255, 255, 255, 0.88);
  line-height: 1.6;
  margin-bottom: 56px;
  word-break: keep-all;
  max-width: 800px;
}

.cta-button {
  display: inline-block;
  font-size: 30px; font-weight: 700;
  color: #FF6F61;
  background: #fff;
  padding: 28px 72px;
  border-radius: 60px;
  letter-spacing: 0.5px;
  box-shadow: 0 6px 28px rgba(0, 0, 0, 0.15);
}

.cta-url {
  font-size: 24px; font-weight: 500;
  color: rgba(255, 255, 255, 0.65);
  margin-top: 28px;
  letter-spacing: 0.5px;
}

/* Slide indicator */
.slide-indicator {
  position: absolute; top: 40px; right: 48px;
  font-size: 22px; font-weight: 600;
  color: rgba(255, 255, 255, 0.85);
  background: rgba(255, 255, 255, 0.2);
  border-radius: 24px; padding: 6px 20px; z-index: 10;
}

.brand-footer {
  width: 100%; padding: 28px 48px;
  text-align: center; font-size: 22px; font-weight: 500;
  color: rgba(255, 255, 255, 0.9);
  letter-spacing: 0.5px;
  background: rgba(0, 0, 0, 0.15);
  position: relative; z-index: 2;
}
</style>
</head>
<body>
<div class="card cta-v2" data-category="{{category}}">
  <div class="deco-circle-1"></div>
  <div class="deco-circle-2"></div>
  <div class="slide-indicator">{{slideNumber}} / {{totalSlides}}</div>
  <div class="card-inner">
    <div class="brand-name">우리 나이가 어때서</div>
    <div class="accent-line"></div>
    <div class="title">{{title}}</div>
    <div class="cta-text">{{ctaText}}</div>
    <div class="cta-button">{{ctaButtonText}}</div>
    <div class="cta-url">{{ctaUrl}}</div>
  </div>
  <div class="brand-footer">우리 나이가 어때서 | age-doesnt-matter.com</div>
</div>
</body>
</html>
