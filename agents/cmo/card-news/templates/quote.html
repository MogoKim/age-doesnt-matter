<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1A1A1A;
  line-height: 1.6;
}

.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  background: #1A1A1A;
}

.bg-image {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
}

/* Subtle dark overlay for readability */
.image-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    180deg,
    rgba(0, 0, 0, 0.3) 0%,
    rgba(0, 0, 0, 0.45) 50%,
    rgba(0, 0, 0, 0.6) 100%
  );
}

/* Giant decorative quote mark */
.quote-mark {
  font-size: 200px; font-weight: 900;
  line-height: 1; opacity: 0.12; color: #fff;
  position: absolute; top: 100px; left: 60px;
  z-index: 3;
  font-family: Georgia, 'Times New Roman', serif;
}

.card-inner {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 180px 80px 80px;
  position: relative; z-index: 3;
}

.title {
  font-size: 28px; font-weight: 600;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 48px;
  word-break: keep-all;
}

.quote-text {
  font-size: 36px; font-weight: 400;
  color: #fff;
  line-height: 1.8;
  word-break: keep-all;
  font-style: italic;
  max-width: 860px;
  margin-bottom: 48px;
}

.accent-line {
  width: 60px; height: 4px;
  border-radius: 2px;
  background: #FF6F61;
  margin-bottom: 32px;
}

.attribution {
  font-size: 26px; font-weight: 500;
  color: rgba(255, 255, 255, 0.65);
  word-break: keep-all;
}

/* Slide indicator */
.slide-indicator {
  position: absolute; top: 40px; right: 48px;
  font-size: 22px; font-weight: 600;
  color: rgba(255, 255, 255, 0.85);
  background: rgba(0, 0, 0, 0.25);
  border-radius: 24px; padding: 6px 20px; z-index: 10;
}

.brand-footer {
  width: 100%; padding: 28px 48px;
  text-align: center; font-size: 22px; font-weight: 500;
  color: rgba(255, 255, 255, 0.9);
  letter-spacing: 0.5px;
  background: rgba(0, 0, 0, 0.4);
  position: relative; z-index: 3;
}
</style>
</head>
<body>
<div class="card quote" data-category="{{category}}">
  <img class="bg-image" src="{{imageUrl}}" alt="">
  <div class="image-overlay"></div>
  <div class="quote-mark">&ldquo;</div>
  <div class="slide-indicator">{{slideNumber}} / {{totalSlides}}</div>
  <div class="card-inner">
    <div class="title">{{title}}</div>
    <div class="quote-text">{{body}}</div>
    <div class="accent-line"></div>
    <div class="attribution">{{attribution}}</div>
  </div>
  <div class="brand-footer">우리 나이가 어때서 | age-doesnt-matter.com</div>
</div>
</body>
</html>
