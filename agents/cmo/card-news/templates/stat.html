<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1A1A1A;
  line-height: 1.6;
}

.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* Category color variables — defaults */
.card { --cat-primary: #FF6F61; --cat-accent: #FF6F61; }
.card[data-category="WELLNESS"] { --cat-primary: #2E7D32; --cat-accent: #4CAF50; background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
.card[data-category="PRACTICAL"] { --cat-primary: #1565C0; --cat-accent: #2196F3; background: linear-gradient(135deg, #E3F2FD, #BBDEFB); }
.card[data-category="COMMUNITY"] { --cat-primary: #E65100; --cat-accent: #FF9800; background: linear-gradient(135deg, #FFF3E0, #FFE0B2); }
.card[data-category="LIFESTYLE"] { --cat-primary: #6A1B9A; --cat-accent: #9C27B0; background: linear-gradient(135deg, #F3E5F5, #E1BEE7); }
.card[data-category="GROWTH"] { --cat-primary: #00695C; --cat-accent: #009688; background: linear-gradient(135deg, #E0F2F1, #B2DFDB); }
.card[data-category="TRENDING"] { --cat-primary: #AD1457; --cat-accent: #E91E63; background: linear-gradient(135deg, #FCE4EC, #F8BBD0); }

.card-inner {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 100px 72px 60px;
  position: relative; z-index: 2;
}

.title {
  font-size: 40px; font-weight: 700;
  color: var(--cat-primary);
  line-height: 1.3; letter-spacing: -0.5px;
  margin-bottom: 64px; word-break: keep-all;
}

.stat-number {
  font-size: 96px; font-weight: 900;
  color: #FF6F61;
  line-height: 1.1; letter-spacing: -2px;
  margin-bottom: 20px;
}

.stat-label {
  font-size: 32px; font-weight: 500;
  color: #555;
  margin-bottom: 48px;
  word-break: keep-all;
}

.body-text {
  font-size: 28px; font-weight: 400;
  line-height: 1.7; color: #666;
  word-break: keep-all;
  max-width: 800px;
  margin-bottom: 40px;
}

.source-text {
  font-size: 20px; font-weight: 400;
  color: #999;
  position: absolute;
  bottom: 24px; left: 0; right: 0;
  text-align: center;
}

/* Slide indicator */
.slide-indicator {
  position: absolute; top: 40px; right: 48px;
  font-size: 22px; font-weight: 600;
  color: var(--cat-primary);
  background: rgba(255, 255, 255, 0.7);
  border-radius: 24px; padding: 6px 20px; z-index: 10;
}

.brand-footer {
  width: 100%; padding: 28px 48px;
  text-align: center; font-size: 22px; font-weight: 500;
  color: #fff; letter-spacing: 0.5px;
  background: var(--cat-primary);
}

/* Decorative circle */
.stat-circle {
  width: 320px; height: 320px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.6);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
  margin-bottom: 40px;
}
</style>
</head>
<body>
<div class="card stat" data-category="{{category}}">
  <div class="slide-indicator">{{slideNumber}} / {{totalSlides}}</div>
  <div class="card-inner">
    <div class="title">{{title}}</div>
    <div class="stat-circle">
      <div class="stat-number">{{statNumber}}</div>
      <div class="stat-label">{{statLabel}}</div>
    </div>
    <div class="body-text">{{body}}</div>
    <div class="source-text">{{source}}</div>
  </div>
  <div class="brand-footer">우리 나이가 어때서 | age-doesnt-matter.com</div>
</div>
</body>
</html>
