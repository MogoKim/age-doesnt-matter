<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1A1A1A;
  line-height: 1.6;
}

.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* Category color variables — defaults */
.card { --cat-primary: #FF6F61; --cat-accent: #FF6F61; }
.card[data-category="WELLNESS"] { --cat-primary: #2E7D32; --cat-accent: #4CAF50; background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
.card[data-category="PRACTICAL"] { --cat-primary: #1565C0; --cat-accent: #2196F3; background: linear-gradient(135deg, #E3F2FD, #BBDEFB); }
.card[data-category="COMMUNITY"] { --cat-primary: #E65100; --cat-accent: #FF9800; background: linear-gradient(135deg, #FFF3E0, #FFE0B2); }
.card[data-category="LIFESTYLE"] { --cat-primary: #6A1B9A; --cat-accent: #9C27B0; background: linear-gradient(135deg, #F3E5F5, #E1BEE7); }
.card[data-category="GROWTH"] { --cat-primary: #00695C; --cat-accent: #009688; background: linear-gradient(135deg, #E0F2F1, #B2DFDB); }
.card[data-category="TRENDING"] { --cat-primary: #AD1457; --cat-accent: #E91E63; background: linear-gradient(135deg, #FCE4EC, #F8BBD0); }

.card-inner {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 100px 72px 60px;
  position: relative; z-index: 2;
}

.page-title {
  font-size: 36px; font-weight: 700;
  color: var(--cat-primary);
  line-height: 1.3;
  margin-bottom: 56px; word-break: keep-all;
  text-align: center;
  opacity: 0.8;
}

/* Step container */
.step-container {
  display: flex; flex-direction: column;
  align-items: center; width: 100%;
}

/* Decorative flow line above step */
.flow-line {
  width: 4px; height: 48px;
  background: linear-gradient(180deg, rgba(255, 111, 97, 0.15), #FF6F61);
  border-radius: 2px;
  margin-bottom: 24px;
}

.step-circle {
  width: 100px; height: 100px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 42px; font-weight: 900;
  color: #fff;
  background: #FF6F61;
  box-shadow: 0 6px 24px rgba(255, 111, 97, 0.35);
  margin-bottom: 16px;
}

.step-label {
  font-size: 24px; font-weight: 600;
  color: #999;
  letter-spacing: 1px;
  margin-bottom: 32px;
}

.step-title {
  font-size: 42px; font-weight: 800;
  color: var(--cat-primary);
  line-height: 1.3; letter-spacing: -0.5px;
  margin-bottom: 28px; word-break: keep-all;
  text-align: center;
}

.step-body {
  font-size: 30px; font-weight: 400;
  line-height: 1.7; color: #4A4A4A;
  word-break: keep-all;
  text-align: center;
  max-width: 820px;
  background: #fff;
  border-radius: 24px;
  padding: 40px 48px;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
}

/* Flow line below step */
.flow-line-bottom {
  width: 4px; height: 48px;
  background: linear-gradient(180deg, #FF6F61, rgba(255, 111, 97, 0.15));
  border-radius: 2px;
  margin-top: 24px;
}

/* Slide indicator */
.slide-indicator {
  position: absolute; top: 40px; right: 48px;
  font-size: 22px; font-weight: 600;
  color: var(--cat-primary);
  background: rgba(255, 255, 255, 0.7);
  border-radius: 24px; padding: 6px 20px; z-index: 10;
}

.brand-footer {
  width: 100%; padding: 28px 48px;
  text-align: center; font-size: 22px; font-weight: 500;
  color: #fff; letter-spacing: 0.5px;
  background: var(--cat-primary);
}
</style>
</head>
<body>
<div class="card stepguide" data-category="{{category}}">
  <div class="slide-indicator">{{slideNumber}} / {{totalSlides}}</div>
  <div class="card-inner">
    <div class="page-title">{{title}}</div>
    <div class="step-container">
      <div class="flow-line"></div>
      <div class="step-circle">{{stepNumber}}</div>
      <div class="step-label">Step {{stepNumber}} of {{stepTotal}}</div>
      <div class="step-title">{{stepTitle}}</div>
      <div class="step-body">{{body}}</div>
      <div class="flow-line-bottom"></div>
    </div>
  </div>
  <div class="brand-footer">우리 나이가 어때서 | age-doesnt-matter.com</div>
</div>
</body>
</html>
