<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1A1A1A;
  line-height: 1.6;
}

.card {
  width: 1080px; height: 1350px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  background: #1A1A1A;
}

.bg-image {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
}

/* Subtle overlay — only bottom 40% */
.image-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    180deg,
    rgba(0, 0, 0, 0.0) 0%,
    rgba(0, 0, 0, 0.05) 50%,
    rgba(0, 0, 0, 0.5) 70%,
    rgba(0, 0, 0, 0.8) 100%
  );
}

.card-inner {
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 80px 72px 48px;
  position: relative; z-index: 2;
}

.title {
  font-size: 36px; font-weight: 700;
  color: rgba(255, 255, 255, 0.7);
  line-height: 1.3;
  margin-bottom: 20px;
  word-break: keep-all;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.body-text {
  font-size: 32px; font-weight: 400;
  color: #fff;
  line-height: 1.7;
  word-break: keep-all;
  font-style: italic;
  margin-bottom: 24px;
  padding-left: 28px;
  border-left: 4px solid rgba(255, 111, 97, 0.7);
}

.attribution {
  font-size: 24px; font-weight: 500;
  color: rgba(255, 255, 255, 0.6);
  margin-bottom: 20px;
}

/* Slide indicator */
.slide-indicator {
  position: absolute; top: 40px; right: 48px;
  font-size: 22px; font-weight: 600;
  color: rgba(255, 255, 255, 0.85);
  background: rgba(0, 0, 0, 0.25);
  border-radius: 24px; padding: 6px 20px; z-index: 10;
}

.brand-footer {
  width: 100%; padding: 28px 48px;
  text-align: center; font-size: 22px; font-weight: 500;
  color: rgba(255, 255, 255, 0.9);
  letter-spacing: 0.5px;
  background: rgba(0, 0, 0, 0.4);
  position: relative; z-index: 2;
}
</style>
</head>
<body>
<div class="card story" data-category="{{category}}">
  <img class="bg-image" src="{{imageUrl}}" alt="">
  <div class="image-overlay"></div>
  <div class="slide-indicator">{{slideNumber}} / {{totalSlides}}</div>
  <div class="card-inner">
    <div class="title">{{title}}</div>
    <div class="body-text">{{body}}</div>
    {{#attribution}}<div class="attribution">{{attribution}}</div>{{/attribution}}
  </div>
  <div class="brand-footer">우리 나이가 어때서 | age-doesnt-matter.com</div>
</div>
</body>
</html>
