      - "D7 리텐션 > 20%"
      - "UGC 비율 > 30%"
      - "일자리 지원 클릭 > 50/일"
      - "평균 세션 > 3분"

  # ── Q2 2026 OKR (2026-04-01 ~ 2026-06-30) — 도전안 확정 ──
  q2_okr:
    objective: "SEO + 입소문 동시 성과로 500명을 만든다"
    confirmed_at: "2026-04-05"

    kr1:
      metric: "MAU"
      target: 500
      breakdown:
        지식인봇_유입: 150
        SEO_검색_유입: 200
        SNS_입소문: 100
        직접_방문: 50
      milestones:
        "2026-04-30": 50
        "2026-05-31": 150
        "2026-06-30": 500

    kr2:
      metric: "주간 댓글 참여 유저 (NSM)"
      target: 50
      unit: "명/주"
      sub_targets:
        일평균_게시글: 5
        댓글_글_비율: "3:1 이상"
        재참여자_비율: "30%+"

    kr3:
      metric: "D7 재방문율"
      target: 35
      unit: "%"
      sub_targets:
        온보딩_완료율: "70%+"
        온보딩_후_D7_댓글_전환: "30%+"
        알림_CTR: "20%+"
      dependency: "isOnboarded 필드 + GA4 Cohort 설정 필요"

    kr4:
      metric: "월 매출"
      target: 200000
      unit: "원"
      breakdown:
        AdSense: 50000
        쿠팡파트너스: 150000
      bep_milestone: "MAU 300 달성 시 BEP 근접 (약 2026-05-31)"

automation_status: "ACTIVE"   # 2026-03-24 창업자 승인 완료. 에이전트 자동화 가동.

# ──────────────────────────────────────────
# 7. 광고 정책
# ──────────────────────────────────────────
ad_policy:
  types: ["자체 배너", "구글 애드센스", "쿠팡 CPS", "외부 직접"]

  priority_order:
    - "1순위: 외부 직접 (유료 계약)"
    - "2순위: 자체 배너 (이벤트·홍보)"
    - "3순위: 쿠팡 CPS (수익)"
    - "4순위: 구글 애드센스 (기본 fill)"

  rules:
    - "모든 광고에 '광고' 라벨 필수"
    - "모바일: 화면당 최대 1개 광고"
    - "정치/도박/성인/약물/다단계 광고 절대 금지"
    - "쿠팡 CPS: 투명성 안내 문구 필수"

# ──────────────────────────────────────────
# 8. 에이전트 행동 규칙 (Guardrails)
# ──────────────────────────────────────────
guardrails:
  must_approve:             # 창업자 승인 필수
    - "UI/UX 코드 변경"
    - "DB 스키마 변경"
    - "새 에이전트 추가"
    - "새 MCP 서버 연결"
    - "예산 한도 변경"
    - "이 헌법(constitution.yaml) 수정"
    - "자동화 봇 가동 시작"

  auto_allowed:             # 에이전트 자율 실행 가능
    - "콘텐츠 읽기·분석·리포트"
    - "KPI 집계 및 저장"
    - "헬스체크 및 모니터링"
    - "어드민 알림 생성"
    - "금지어 감지 및 자동 숨김"

  hard_limits:
    - "비용 상한 $50/월 — 초과 시 즉시 차단 + Slack #알림-긴급 알림"
    - "DB ALTER TABLE 권한 없음"
    - "사용자 개인정보 외부 전송 절대 금지"
    - "에이전트가 직접 에이전트 생성 불가"
    - "대량 삭제·차단 등 파괴적 액션 절대 금지"
    - "자동화 콘텐츠 발행은 automation_status: ACTIVE 상태에서만 가능"

  emergency:
    trigger: "어드민 긴급 중지 토글 1클릭"
    action: "전체 Cron 즉시 정지"
    notify: "Slack #알림-긴급 → 창업자 즉시 알림"

# ──────────────────────────────────────────
# 8-1. 모델 정책
# ──────────────────────────────────────────
model_policy:
  strategic: "claude-opus — 주간 전략 수립, 실험 설계 (주 1-2회)"
  heavy: "claude-sonnet — 고객 대면 콘텐츠, 분석, 일자리 가공 (일 1-3회)"
  light: "claude-haiku — 데이터 집계, 모니터링, 헬스체크 (빈번 실행)"
  rule: "고객이 보는 결과물 = heavy 이상, 내부 운영 = light, 매거진 = heavy (주1 Opus 특집호)"

# ──────────────────────────────────────────
# 8-2. 인기글 정책
# ──────────────────────────────────────────
trending_policy:
  score_formula: "(likeCount*3 + commentCount*5 + viewCount*0.1) / (hoursAge+2)^1.5"
  recalculation: "매 30분 (COO trending-scorer)"
  hot_demotion: "72시간 무참여 + 7일 경과 → NORMAL 강등"
  hall_of_fame: "영구 유지 (50+ 공감 달성 보상)"
  home_trending: "48시간 이내 게시글, trendingScore 상위 5개"

# ──────────────────────────────────────────
# 8-3. SNS 플랫폼 전략 (상세는 코드 참조)
# ──────────────────────────────────────────
sns_platform_strategy:
  threads: "체류시간 최적화 — 캐주얼 대화체, 100-200자, 토픽태그 1개"
  x: "정보형 권위 — 뉴스톤 팩트 기반, 100-140자, 해시태그 2-3개"
  instagram: "비주얼 라이프스타일 — 카드뉴스 캐러셀, 따뜻한 인생 2막 감성"
  facebook: "커뮤니티 공유 — 이야기체 + 질문, 500-1000자, 댓글 유도"
  band: "실용 그룹 정보 — 이웃 친근감, 이벤트/일정/팁, 300-500자"
  naver: "SEO 검색 유입 — 매거진 리퍼포징, 1000-3000자"

# ──────────────────────────────────────────
# 8-3b. CMO 콘텐츠 전략 비율 (social-poster.ts가 파싱하여 사용)
# ──────────────────────────────────────────
cmo_content_ratios:
  exploit_ratio: 0.7       # exploit(검증 공식 자동 게시) 비율 — 0.0~1.0
  promotion_level:
    pure: 60               # 순수 커뮤니티 콘텐츠 (홍보 없음) %
    soft: 25               # 서비스 자연스럽게 언급 %
    direct: 15             # 직접 서비스 홍보 %
  # 창업자 조정 가이드:
  # - 서비스 초기/실험 많음 → exploit_ratio 낮추기 (0.5~0.6)
  # - 서비스 안정/검증 완료 → exploit_ratio 높이기 (0.8~0.9)

# ──────────────────────────────────────────
# 8-4. 보안 관리
# ──────────────────────────────────────────
security:
  owner: "CTO"
  monitoring:
    - "에러/이상 감지 (2시간 간격)"
    - "보안 감사 (매일 06:00 KST)"
    - "비용 이상 감지 (매일)"
  escalation: "#알림-긴급 → 창업자 즉시 알림"
  checks:
    - "로그인 실패 횟수 급증"
    - "Rate limit 위반 패턴"
    - "비정상 어드민 액션"
    - "단일 에이전트 $1 초과 비용"

# ──────────────────────────────────────────
# 8-5. CTO 아키텍처 거버넌스 (신설)
# ──────────────────────────────────────────
cto_governance:
  role: "기술 헌법 집행관 — constitution 기술 규칙이 실제 코드에 지켜지는지 감시"
  domains:
    - "신뢰성: 헬스체크·에러·보안·크롤러 모니터링 (기존)"
    - "거버넌스: 주간 코드 건강 리포트 (arch-review, 월요일)"
    - "QA 오케스트레이션: QA 에이전트를 지휘해서 배포 품질 보장"
  tasks:
    - "health-check: 매시간, DB/Site/API 응답 확인 + 추세 저장"
    - "error-monitor: 2시간마다, 반복 패턴 비교 포함"
    - "security-audit: 매일 06:00 KST, 보안 이상 징후"
    - "crawler-health: 매일 07:00 KST, 7일 품질 추세 포함"
    - "qa-verify: 배포 후 + 23:45 KST, 동적 크론 감사"
    - "arch-review: 월요일 07:00 KST, 주간 아키텍처 건강 리포트"

# ──────────────────────────────────────────
# 8-6. QA 에이전트 (신설)
# ──────────────────────────────────────────
qa_agent:
  owner: "QA"
  reports_to: "CTO"
  model: "light"  # Haiku — 데이터 검증 위주
  canWrite: true  # 자동 수정 필요 (JSON unwrap, 이미지 삽입)
  tasks:
    - "content-audit: 매일 08:20 KST, 최근 24시간 콘텐츠 품질 검증 + 자동 수정"
    - "code-gate (Gate 1): /done 스킬 실행 시 자동 호출 — 배포 전 코드 품질 검증"
    - "deploy-audit (Gate 2): Vercel 배포 완료 후 GitHub Actions 자동 실행 — 프로덕션 감사"
  gate_system:
    gate1:
      trigger: "/done 스킬 (Claude Code 대화창에서 작업 완료 선언 시)"
      checks:
        - "TypeScript: tsc --noEmit (에러 0개 필수)"
        - "크론 연결 무결성: check-cron-links.ts (orphaned 핸들러 없음)"
        - "빌드: npm run build (agents/workflows/prisma 변경 시만)"
        - "AI 아키텍처: Haiku가 constitution 규칙 위반 여부 판단"
      pass_action: "자동으로 git commit + git push origin main (묻지 않음)"
      fail_action: "Claude 대화창 오류 표시 + Slack #qa 상세 알림 + 커밋 중단"
      slack_format: "프로젝트명 우나어(age-doesnt-matter) + 구분선 + 각 체크 결과 + 행동 지침"
    gate2:
      trigger: "Vercel deployment_status=success (프로덕션 배포 완료 시 자동)"
      checks:
        - "스모크 테스트: 8개 엔드포인트 응답 확인"
        - "크론 연결 재확인"
        - "광고 렌더링: Playwright Chromium + mobile-chrome"
        - "CPO UX 점수: ux-analyzer BotLog 읽기 (-20% 하락 시 FAIL)"
        - "콘텐츠 품질: 1시간 내 MAGAZINE 글 존재 여부"
        - "AI 종합 판단: Haiku가 PASS/WARN/FAIL 결정"
      pass_action: "Slack #qa 1줄 성공 메시지"
      fail_action: "Slack #qa 상세 알림 + AdminQueue 에스컬레이션"
      warn_action: "Slack #qa 경고 (배포는 유지, 모니터링 강화)"
  pass_criteria:
    gate1: "4개 체크 전부 PASS"
    gate2: "스모크 전체 성공 + CPO UX -20% 미만 + AI 판단 PASS/WARN"
  distinction_from_cto:
    CTO: "기술 아키텍처 + 보안 + 인프라 (코드 레벨)"
    QA: "실제 데이터/콘텐츠/사용자 경험 품질 (비즈니스 레벨) + 2-Gate 배포 검증"
  escalation:
    auto_fixable: "자동 수정 후 Slack #qa info 알림"
    manual_required: "Slack #qa important 알림 + CTO 에스컬레이션"
    gate2_fail: "AdminQueue 등록 → 창업자 확인 필요"

# ──────────────────────────────────────────
# 9. 알림 채널
# ──────────────────────────────────────────
notification:
  channel: "Slack (13개 채널 운영)"
  reason: "채널 분리로 구조화된 운영 — 에이전트 회의/미팅로그/알림/로그 분리"
  levels:
    critical: "에이전트 비정상·비용 초과·헌법 위반 → #알림-긴급 + #ceo-창업자 즉시 전송"
    important: "일일 리포트·KPI 변동 → #알림-시스템"
    info: "콘텐츠 발행·일반 이벤트 → 에이전트별 로그 채널 (알림 무음)"
  channels:
    founder: ["#ceo-창업자", "#일일-브리핑", "#주간-리포트"]
    collaboration: ["#에이전트-회의실", "#회의록"]
    alerts: ["#알림-긴급", "#알림-시스템", "#알림-kpi"]
    logs: ["#로그-일자리", "#로그-콘텐츠", "#로그-마케팅", "#로그-비용"]
    growth: ["#실험-보드"]

# ──────────────────────────────────────────
# 10. 인텔리전스 정책 (Intelligence Harness)
# ──────────────────────────────────────────
intelligence_policy:
  # 모든 에이전트는 오늘의 욕망 지도를 읽어야 함
  daily_brief_mandatory: true
  brief_source: "agents/core/today-brief.json"
  db_model: "DailyBrief"

  # 오늘 브리프 없으면 어제 브리프로 폴백
  fallback_to_previous: true
  fallback_alert_channel: "#알림-시스템"

  # 브리프 직접 인용 금지 — 자연스러운 분위기 반영만
  content_override_prohibited: true
  reason: "브리프를 직접 인용하면 부자연스러움. 분위기로 흡수해서 행동."

  # 지배적 욕망 판정 임계값
  dominant_desire_threshold_pct: 25
  flat_distribution_behavior: "quotaMultiplier 조정 없이 기본 스케줄 유지"

  # 엔터 페르소나 활성화 규칙
  entertain_activation:
    active_threshold_pct: 10    # ENTERTAIN >= 10% → EN1-EN5 글쓰기 + 댓글
    passive_threshold_pct: 5    # ENTERTAIN >= 5% → 댓글만
    dormant_below_pct: 5        # ENTERTAIN < 5% → 완전 비활성

  # midDayPatch 제한
  mid_day_patch:
    schedule: "12:30 KST (quick crawl 완료 후)"
    quota_delta_cap: 0.2         # quotaMultiplier 최대 ±0.2 조정
    min_change_trigger_pct: 5    # 5% 이상 변화 시에만 패치 생성
    dominant_desire_immutable: true  # 아침에 결정된 dominantDesire 변경 불가

  # 크롤링 소스 정책 (2026-04-07 개편)
  data_sources:
    cafe_crawling:
      active: [wgang, dlxogns01]
      removed: [welovesilver, 5060years, 82cook]  # 2026-04-07 데이터 품질 미달로 제거
      strategy: "2개 카페 딥다이브 — 게시판 ~55개, maxPostsPerCafe:80, 댓글 15개+대댓글"
    comment_learning:
      enabled: true
      max_comments_per_post: 15   # 5 → 15
      include_replies: true        # 대댓글 수집 신규
      speech_tone_aggregation: true  # trend-analyzer cafeSummary에 저장

  # 파이프라인 순서
  pipeline_order:
    - "crawler.ts (08:30 DEEP) — 2개 카페, 댓글+대댓글 수집"
    - "external-crawler.ts (비활성 — EXTERNAL_CONFIGS 빈 배열)"
    - "psych-analyzer.ts (Haiku 배치, speechTone 분석 포함)"
    - "trend-analyzer.ts (집계 + 말투학습 cafeSummary 저장)"
    - "daily-brief.ts (욕망지도 → today-brief.json, dataSourceBias 포함)"
    - "모든 에이전트 09:00 이후 loadTodayBrief() 호출"

# ──────────────────────────────────────────
# 11. 포지셔닝 & 경쟁 전략 (2026-04-04 확정)
# ──────────────────────────────────────────
positioning:
  one_line: "50·60대의 외로움과 막막함을 서로의 이야기로 채우는 곳"

  # 감성 축(RELATION) + 실용 축(RETIRE+MONEY) 동시 포지셔닝
  axes:
    emotional: "RELATION — 혼자라는 느낌에서 벗어나는 연결 (왜 오는가)"
    practical: "RETIRE+MONEY — 인생 다음 챕터 준비 (머무르는 이유)"

  headline_message: >
    "혼자 끙끙 앓던 그 고민 — 여기 다 있어요.
    인생 다음 챕터, 같이 준비해요."

  moat:
    - name: "전용 공간"
      desc: "'시니어 플랫폼'이 아닌 50·60대가 스스로 만드는 커뮤니티 — 체면 없이 진짜 이야기"
    - name: "욕망 설계 구조"
      desc: "RELATION(연결) + RETIRE(인생2막) + MONEY(노후준비) 3축으로 설계된 카테고리"
    - name: "AI 운영 플라이휠"
      desc: "시드봇 콘텐츠 → 실사용자 유입 → 데이터 학습 → 더 나은 콘텐츠 → 재유입"

  competitors:
    naver_cafe:
      strength: "기존 회원 수십만, 검색 유입"
      weakness: "카테고리 파편화, AI 없음, 50·60대 전용 아님"
      우나어_차별점: "단일 홈 + AI 큐레이션 + 욕망 설계 카테고리"
    band:
      strength: "중장년 사용자 많음, 모임 기능"
      weakness: "폐쇄적 그룹, 검색 노출 없음"
      우나어_차별점: "느슨한 연결 (익명 발견 가능) vs 폐쇄 모임"
    senior_apps:
      strength: "50+ 타겟 명확"
      weakness: "단일 기능(일자리/건강), UX 열악, 규모 극소"
      우나어_차별점: "연결+인생2막+노후준비+일자리 종합 플랫폼"

  conclusion: "직접 경쟁자 없음 — 50·60대 전용 + AI 운영 + 욕망 설계 종합 커뮤니티는 우나어가 유일"
