# 에이전트 Cron 스케줄 (KST 기준, GitHub Actions에서 UTC 변환)
# automation_status: LOCKED 상태에서는 실행하지 않음

schedules:
  # 2시간마다
  - cron: "0 */2 * * *"
    agent: CTO
    task: health-check
    handler: "cto/health-check.ts"

  # 매일 09:00 KST (00:00 UTC)
  - cron: "0 0 * * *"
    agent: CEO
    task: morning-cycle
    handler: "ceo/morning-cycle.ts"

  # 매일 09:00 KST — 시드 콘텐츠
  - cron: "0 0 * * *"
    agent: SEED
    task: "seed-09"
    handler: "seed/scheduler.ts"

  # 매일 10:00 KST (01:00 UTC)
  - cron: "0 1 * * *"
    agent: CMO
    task: trend-analyzer
    handler: "cmo/trend-analyzer.ts"

  # 매일 10:00 KST — 시드 콘텐츠
  - cron: "0 1 * * *"
    agent: SEED
    task: "seed-10"
    handler: "seed/scheduler.ts"

  # 매일 11:00 KST (02:00 UTC)
  - cron: "0 2 * * *"
    agent: CPO
    task: ux-analyzer
    handler: "cpo/ux-analyzer.ts"

  # 매일 14:00 KST (05:00 UTC) — 에디터스 픽 + 시드
  - cron: "0 5 * * *"
    agent: COO
    task: content-scheduler
    handler: "coo/content-scheduler.ts"
  - cron: "0 5 * * *"
    agent: SEED
    task: "seed-14"
    handler: "seed/scheduler.ts"

  # 매일 16:00 KST (07:00 UTC)
  - cron: "0 7 * * *"
    agent: SEED
    task: "seed-16"
    handler: "seed/scheduler.ts"

  # 매일 19:00 KST (10:00 UTC)
  - cron: "0 10 * * *"
    agent: SEED
    task: "seed-19"
    handler: "seed/scheduler.ts"

  # 매일 21:00 KST (12:00 UTC)
  - cron: "0 12 * * *"
    agent: SEED
    task: "seed-21"
    handler: "seed/scheduler.ts"

  # 매일 22:00 KST (13:00 UTC)
  - cron: "0 13 * * *"
    agent: CDO
    task: kpi-collector
    handler: "cdo/kpi-collector.ts"

  # 매일 23:00 KST (14:00 UTC)
  - cron: "0 14 * * *"
    agent: CFO
    task: cost-tracker
    handler: "cfo/cost-tracker.ts"

  # 매일 모더레이션 (하루 3회: 09, 15, 21 KST)
  - cron: "0 0,6,12 * * *"
    agent: COO
    task: moderator
    handler: "coo/moderator.ts"

  # 에러 모니터 (2시간마다)
  - cron: "30 */2 * * *"
    agent: CTO
    task: error-monitor
    handler: "cto/error-monitor.ts"

  # 이상 감지 (2시간마다)
  - cron: "45 */2 * * *"
    agent: CDO
    task: anomaly-detector
    handler: "cdo/anomaly-detector.ts"

  # ── 카페 크롤링 + 트렌드 분석 (하루 3회, 로컬 Mac) ──
  # 08:30 KST — 아침 크롤링 (로컬 launchd)
  - cron: "30 23 * * *"  # 08:30 KST = 23:30 UTC (전일)
    agent: CAFE_CRAWLER
    task: cafe-pipeline
    handler: "cafe/run-pipeline.ts"
    note: "로컬 Mac에서 launchd로 실행 (네이버 로그인 필요)"

  # 09:00 KST — 트렌드 분석 + 큐레이션 (GitHub Actions)
  - cron: "0 0 * * *"
    agent: CAFE_CRAWLER
    task: trend-analysis
    handler: "cafe/trend-analyzer.ts"
    note: "크롤링 30분 후 자동 분석 (클라우드)"

  # 12:30 KST — 점심 크롤링 (로컬)
  - cron: "30 3 * * *"
    agent: CAFE_CRAWLER
    task: cafe-pipeline
    handler: "cafe/run-pipeline.ts"

  # 18:30 KST — 저녁 크롤링 (로컬)
  - cron: "30 9 * * *"
    agent: CAFE_CRAWLER
    task: cafe-pipeline
    handler: "cafe/run-pipeline.ts"

  # ── 일자리 자동 수집 (하루 3회) ──
  # 12:00 KST (03:00 UTC)
  - cron: "0 3 * * *"
    agent: COO
    task: job-scraper
    handler: "coo/job-scraper.ts"

  # 16:00 KST (07:00 UTC)
  - cron: "0 7 * * *"
    agent: COO
    task: job-scraper
    handler: "coo/job-scraper.ts"

  # 20:00 KST (11:00 UTC)
  - cron: "0 11 * * *"
    agent: COO
    task: job-scraper
    handler: "coo/job-scraper.ts"

  # ── 소셜미디어 자동 포스팅 (하루 1회) ──
  # 15:00 KST (06:00 UTC)
  - cron: "0 6 * * *"
    agent: CMO
    task: social-poster
    handler: "cmo/social-poster.ts"
    note: "인기글/매거진 → SNS 홍보 콘텐츠 생성 (Threads/X)"
