# 안전장치
safety:
  max_per_post: 1                    # 같은 글에 알바생 1명만
  daily_posts: "4~6개"               # 10명 기준
  daily_comments: "25~35개"          # 10명 기준
  daily_likes: "15~25개"
  db_source: "BOT"                   # source 필드 값
  reduce_at_ugc_50: true             # UGC 50% 시 빈도 50% 감소
  stop_at_ugc_70: true               # UGC 70% 시 중단
  max_same_author_daily: 2           # 같은 페르소나 하루 최대 글 2개
