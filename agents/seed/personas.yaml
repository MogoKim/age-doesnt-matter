# 안전장치
safety:
  max_per_post: 2                    # 같은 글에 알바생 최대 2명
  daily_posts: "10~14개"             # 20명 기준
  daily_comments: "50~70개"          # 20명 기준
  daily_likes: "40~60개"             # 20명 기준
  daily_replies: "15~25개"           # 20명 기준
  db_source: "BOT"                   # source 필드 값
  reduce_at_ugc_50: false            # 비활성 — 초기 콘텐츠 확보 필요
  stop_at_ugc_70: false              # 비활성 — 초기 콘텐츠 확보 필요
  max_same_author_daily: 2           # 같은 페르소나 하루 최대 글 2개
